server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Health check for k8s liveness/readiness probes
    location = /health {
        access_log off;
        return 200 '{"status":"healthy","service":"inec-frontend"}';
        add_header Content-Type application/json;
    }

    location = /readiness {
        proxy_pass http://inec-backend:8088;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/(\.well-known|admin|ai|ai-monitoring|api|audit|auth|biometric|blockchain|bvas|dashboard|db|disputes|document-ai|elections|ems|export|geo|geofence|gotv|healthz|incidents|inec|ingestion|kyc|middleware|observer|parties|pgpool|production|push|results|scale|sms|stakeholders|training|ussd|voters|uploads)(/|$) {
        proxy_pass http://inec-backend:8088;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_pass_header X-Accel-Buffering;
        proxy_read_timeout 3600s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
}
