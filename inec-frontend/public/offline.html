<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INEC Platform — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8fafc; color: #1e293b; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    .container { text-align: center; max-width: 480px; }
    .icon { font-size: 64px; margin-bottom: 16px; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    p { font-size: 16px; color: #64748b; margin-bottom: 24px; line-height: 1.5; }
    .queue-info { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    .queue-count { font-size: 32px; font-weight: 700; color: #16a34a; }
    .queue-label { font-size: 14px; color: #64748b; }
    button { background: #16a34a; color: #fff; border: none; border-radius: 8px; padding: 12px 24px; font-size: 16px; font-weight: 600; cursor: pointer; }
    button:hover { background: #15803d; }
    .status { margin-top: 16px; font-size: 14px; color: #94a3b8; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>The INEC platform is currently unable to connect to the server. Your pending submissions are safely queued and will be sent automatically when connectivity is restored.</p>
    <div class="queue-info">
      <div class="queue-count" id="queueCount">—</div>
      <div class="queue-label">Pending submissions in queue</div>
    </div>
    <button onclick="window.location.reload()">Try Again</button>
    <div class="status" id="status">Waiting for network...</div>
  </div>
  <script>
    if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
      navigator.serviceWorker.controller.postMessage('getQueueCount');
      navigator.serviceWorker.addEventListener('message', (e) => {
        if (e.data?.type === 'queueCount') {
          document.getElementById('queueCount').textContent = e.data.count;
        }
      });
    }
    window.addEventListener('online', () => {
      document.getElementById('status').textContent = 'Connection restored! Reloading...';
      setTimeout(() => window.location.reload(), 1000);
    });
  </script>
</body>
</html>
