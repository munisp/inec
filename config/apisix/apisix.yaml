routes:
  - uri: /auth/*
    upstream:
      type: roundrobin
      nodes:
        "go-backend:8088": 1
    plugins:
      limit-req:
        rate: 10
        burst: 5
        key_type: var
        key: remote_addr

  - uri: /elections/*
    upstream:
      type: roundrobin
      nodes:
        "go-backend:8088": 1
    plugins:
      limit-req:
        rate: 30
        burst: 10
        key_type: var
        key: remote_addr

  - uri: /results/*
    upstream:
      type: roundrobin
      nodes:
        "go-backend:8088": 1
    plugins:
      limit-req:
        rate: 20
        burst: 10
        key_type: var
        key: remote_addr

  - uri: /geo/tiles/*
    upstream:
      type: roundrobin
      nodes:
        "go-backend:8088": 1
    plugins:
      proxy-cache:
        cache_ttl: 300
      limit-req:
        rate: 120
        burst: 60
        key_type: var
        key: remote_addr

  - uri: /geo/*
    upstream:
      type: roundrobin
      nodes:
        "go-backend:8088": 1
    plugins:
      limit-req:
        rate: 60
        burst: 30
        key_type: var
        key: remote_addr

  - uri: /dashboard/*
    upstream:
      type: roundrobin
      nodes:
        "go-backend:8088": 1
    plugins:
      limit-req:
        rate: 30
        burst: 15
        key_type: var
        key: remote_addr

  - uri: /audit/*
    upstream:
      type: roundrobin
      nodes:
        "go-backend:8088": 1
    plugins:
      limit-req:
        rate: 20
        burst: 10
        key_type: var
        key: remote_addr

  - uri: /incidents/*
    upstream:
      type: roundrobin
      nodes:
        "go-backend:8088": 1
    plugins:
      limit-req:
        rate: 15
        burst: 5
        key_type: var
        key: remote_addr

  - uri: /middleware/*
    upstream:
      type: roundrobin
      nodes:
        "go-backend:8088": 1

  - uri: /parties
    upstream:
      type: roundrobin
      nodes:
        "go-backend:8088": 1

  - uri: /healthz
    upstream:
      type: roundrobin
      nodes:
        "go-backend:8088": 1

  # ── Frontend Cache Control ──
  # index.html: NEVER cache — always serve fresh so new deploys take effect
  - uri: /
    upstream:
      type: roundrobin
      nodes:
        "frontend:80": 1
    plugins:
      response-rewrite:
        headers:
          set:
            Cache-Control: "no-cache, no-store, must-revalidate"
            Pragma: "no-cache"
            Expires: "0"

  - uri: /index.html
    upstream:
      type: roundrobin
      nodes:
        "frontend:80": 1
    plugins:
      response-rewrite:
        headers:
          set:
            Cache-Control: "no-cache, no-store, must-revalidate"
            Pragma: "no-cache"
            Expires: "0"

  # sw.js: NEVER cache — browser must always check for new service worker
  - uri: /sw.js
    upstream:
      type: roundrobin
      nodes:
        "frontend:80": 1
    plugins:
      response-rewrite:
        headers:
          set:
            Cache-Control: "no-cache, no-store, must-revalidate"
            Service-Worker-Allowed: "/"

  # Hashed JS/CSS assets: cache forever (filenames contain content hashes)
  - uri: /assets/*
    upstream:
      type: roundrobin
      nodes:
        "frontend:80": 1
    plugins:
      response-rewrite:
        headers:
          set:
            Cache-Control: "public, max-age=31536000, immutable"

  # manifest.json: short cache so PWA updates are picked up
  - uri: /manifest.json
    upstream:
      type: roundrobin
      nodes:
        "frontend:80": 1
    plugins:
      response-rewrite:
        headers:
          set:
            Cache-Control: "public, max-age=3600"

#END
