# Pgpool-II Configuration for INEC Election Platform
# High Availability, Load Balancing, and Connection Pooling

# --- General Settings ---
listen_addresses = '*'
port = 5432
socket_dir = '/var/run/pgpool'
pcp_listen_addresses = '*'
pcp_port = 9898
pcp_socket_dir = '/var/run/pgpool'

# --- Backend Servers ---
backend_hostname0 = 'pg-primary'
backend_port0 = 5432
backend_weight0 = 1
backend_data_directory0 = '/var/lib/postgresql/data'
backend_flag0 = 'ALLOW_TO_FAILOVER'
backend_application_name0 = 'pg-primary'

backend_hostname1 = 'pg-replica'
backend_port1 = 5432
backend_weight1 = 2
backend_data_directory1 = '/var/lib/postgresql/data'
backend_flag1 = 'ALLOW_TO_FAILOVER'
backend_application_name1 = 'pg-replica'

# --- Connection Pooling ---
num_init_children = 64
max_pool = 4
child_life_time = 300
child_max_connections = 0
connection_life_time = 0
client_idle_limit = 300
connection_cache = on
reserved_connections = 2

# --- Streaming Replication Mode ---
backend_clustering_mode = 'streaming_replication'
sr_check_period = 5
sr_check_user = 'replicator'
sr_check_password = ''
sr_check_database = 'inec_db'
delay_threshold = 10000000

# --- Load Balancing ---
load_balance_mode = on
statement_level_load_balance = on
ignore_leading_white_space = on
disable_load_balance_on_write = 'transaction'

# --- Health Check ---
health_check_period = 10
health_check_timeout = 20
health_check_user = 'inec_admin'
health_check_password = ''
health_check_database = 'inec_db'
health_check_max_retries = 3
health_check_retry_delay = 1
connect_timeout = 10000

# --- Failover ---
failover_command = '/etc/pgpool-II/failover.sh %d %h %p %D %m %H %M %P %r %R %N %S'
failover_on_backend_error = on
failover_on_backend_shutdown = off
detach_false_primary = on
auto_failback = on
auto_failback_interval = 60

# --- In-Memory Query Cache ---
memory_cache_enabled = on
memqcache_method = 'shmem'
memqcache_memcached_host = ''
memqcache_memcached_port = 0
memqcache_total_size = 67108864
memqcache_max_num_cache = 1000000
memqcache_expire = 15
memqcache_auto_cache_invalidation = on
memqcache_maxcache = 409600
memqcache_cache_block_size = 1048576

# --- Logging ---
log_destination = 'stderr'
log_line_prefix = '%t [%p]: '
log_connections = on
log_disconnections = on
log_hostname = off
log_statement = off
log_per_node_statement = off
log_client_messages = off
log_standby_delay = 'if_over_threshold'
log_min_messages = 'WARNING'

# --- SSL (disabled for internal Docker network) ---
ssl = off

# --- Watchdog (for multi-Pgpool HA) ---
use_watchdog = off

# --- Authentication ---
enable_pool_hba = on
pool_passwd = 'pool_passwd'
authentication_timeout = 60
allow_clear_text_frontend_auth = on
