# OpenAppSec v1beta1 local policy for the APISIX gateway attachment.
# This file is mounted as /ext/appsec/local_policy.yaml in appsec-agent.
policies:
  default:
    mode: prevent-learn
    triggers:
      - appsec-default-log-trigger
    practices:
      - webapp-default-practice
    custom-response: appsec-default-web-user-response
  specific-rules:
    - host: "inec.local"
      mode: prevent-learn
      triggers:
        - appsec-default-log-trigger
      practices:
        - webapp-default-practice
      custom-response: appsec-default-web-user-response

practices:
  - name: webapp-default-practice
    web-attacks:
      minimum-confidence: high
      override-mode: as-top-level

log-triggers:
  - name: appsec-default-log-trigger
    appsec-logging:
      detect-events: true
      prevent-events: true
      log-destination:
        stdout:
          format: json

custom-responses:
  - name: appsec-default-web-user-response
    mode: response-code-only
    http-response-code: 403
