global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerting_rules.yml"

scrape_configs:
  - job_name: "gotv-svc"
    static_configs:
      - targets: ["gotv-svc:8103"]
    metrics_path: "/metrics"
    scrape_interval: 10s

  - job_name: "gotv-engine"
    static_configs:
      - targets: ["gotv-engine:8200"]
    metrics_path: "/metrics"

  - job_name: "gotv-analytics"
    static_configs:
      - targets: ["gotv-analytics:8300"]
    metrics_path: "/metrics"

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
