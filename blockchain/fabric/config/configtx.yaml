# Channel configuration for the INEC election ledger (Fabric 2.5, Raft).
# Consumed by configtxgen to produce the channel genesis block for `inec-results`.

Organizations:
  - &OrdererOrg
    Name: OrdererOrg
    ID: OrdererMSP
    MSPDir: ../organizations/ordererOrganizations/inec.gov.ng/msp
    Policies:
      Readers: { Type: Signature, Rule: "OR('OrdererMSP.member')" }
      Writers: { Type: Signature, Rule: "OR('OrdererMSP.member')" }
      Admins: { Type: Signature, Rule: "OR('OrdererMSP.admin')" }
    OrdererEndpoints:
      - orderer.inec.gov.ng:7050

  - &INEC
    Name: INECMSP
    ID: INECMSP
    MSPDir: ../organizations/peerOrganizations/inec.inec.gov.ng/msp
    Policies:
      Readers: { Type: Signature, Rule: "OR('INECMSP.admin','INECMSP.peer','INECMSP.client')" }
      Writers: { Type: Signature, Rule: "OR('INECMSP.admin','INECMSP.client')" }
      Admins: { Type: Signature, Rule: "OR('INECMSP.admin')" }
      Endorsement: { Type: Signature, Rule: "OR('INECMSP.peer')" }

  - &Observers
    Name: ObserversMSP
    ID: ObserversMSP
    MSPDir: ../organizations/peerOrganizations/observers.inec.gov.ng/msp
    Policies:
      Readers: { Type: Signature, Rule: "OR('ObserversMSP.admin','ObserversMSP.peer','ObserversMSP.client')" }
      Writers: { Type: Signature, Rule: "OR('ObserversMSP.admin','ObserversMSP.client')" }
      Admins: { Type: Signature, Rule: "OR('ObserversMSP.admin')" }
      Endorsement: { Type: Signature, Rule: "OR('ObserversMSP.peer')" }

Capabilities:
  Channel: &ChannelCapabilities { V2_0: true }
  Orderer: &OrdererCapabilities { V2_0: true }
  Application: &ApplicationCapabilities { V2_5: true }

Application: &ApplicationDefaults
  Organizations:
  Policies:
    Readers: { Type: ImplicitMeta, Rule: "ANY Readers" }
    Writers: { Type: ImplicitMeta, Rule: "ANY Writers" }
    Admins: { Type: ImplicitMeta, Rule: "MAJORITY Admins" }
    LifecycleEndorsement: { Type: ImplicitMeta, Rule: "MAJORITY Endorsement" }
    Endorsement: { Type: ImplicitMeta, Rule: "MAJORITY Endorsement" }
  Capabilities: *ApplicationCapabilities

Orderer: &OrdererDefaults
  OrdererType: etcdraft
  Addresses:
    - orderer.inec.gov.ng:7050
  EtcdRaft:
    Consenters:
      - Host: orderer.inec.gov.ng
        Port: 7050
        ClientTLSCert: ../organizations/ordererOrganizations/inec.gov.ng/orderers/orderer.inec.gov.ng/tls/server.crt
        ServerTLSCert: ../organizations/ordererOrganizations/inec.gov.ng/orderers/orderer.inec.gov.ng/tls/server.crt
  BatchTimeout: 2s
  BatchSize:
    MaxMessageCount: 500
    AbsoluteMaxBytes: 10 MB
    PreferredMaxBytes: 2 MB
  Policies:
    Readers: { Type: ImplicitMeta, Rule: "ANY Readers" }
    Writers: { Type: ImplicitMeta, Rule: "ANY Writers" }
    Admins: { Type: ImplicitMeta, Rule: "MAJORITY Admins" }
    BlockValidation: { Type: ImplicitMeta, Rule: "ANY Writers" }
  Capabilities: *OrdererCapabilities

Channel: &ChannelDefaults
  Policies:
    Readers: { Type: ImplicitMeta, Rule: "ANY Readers" }
    Writers: { Type: ImplicitMeta, Rule: "ANY Writers" }
    Admins: { Type: ImplicitMeta, Rule: "MAJORITY Admins" }
  Capabilities: *ChannelCapabilities

Profiles:
  INECResultsChannel:
    <<: *ChannelDefaults
    Orderer:
      <<: *OrdererDefaults
      Organizations:
        - *OrdererOrg
      Capabilities: *OrdererCapabilities
    Application:
      <<: *ApplicationDefaults
      Organizations:
        - *INEC
        - *Observers
