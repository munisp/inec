# Hyperledger Fabric 2.5 network for the INEC election ledger.
#
# Topology (Raft ordering, two organisations):
#   - orderer.inec.gov.ng          Raft orderer
#   - peer0.inec.inec.gov.ng       INEC org endorsing peer     (+ CouchDB state DB)
#   - peer0.observers.inec.gov.ng  Observers org endorsing peer (+ CouchDB state DB)
#   - ca.inec / ca.observers       Fabric CAs (identity issuance)
#
# Crypto material and channel artifacts are generated by ./deploy.sh before
# `docker compose up`. See README.md for the full bootstrap sequence.

version: "3.7"

networks:
  inec-fabric:
    name: inec-fabric

services:
  ca.inec:
    image: hyperledger/fabric-ca:1.5.7
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-inec
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=7054
    ports:
      - "7054:7054"
    command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
    volumes:
      - ./organizations/fabric-ca/inec:/etc/hyperledger/fabric-ca-server
    networks: [inec-fabric]

  ca.observers:
    image: hyperledger/fabric-ca:1.5.7
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-observers
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=8054
    ports:
      - "8054:8054"
    command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
    volumes:
      - ./organizations/fabric-ca/observers:/etc/hyperledger/fabric-ca-server
    networks: [inec-fabric]

  orderer.inec.gov.ng:
    image: hyperledger/fabric-orderer:2.5.4
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_BOOTSTRAPMETHOD=none
      - ORDERER_CHANNELPARTICIPATION_ENABLED=true
      - ORDERER_ADMIN_LISTENADDRESS=0.0.0.0:7053
      - ORDERER_ADMIN_TLS_ENABLED=true
      - ORDERER_ADMIN_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_ADMIN_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_ADMIN_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_TLS_CLIENTROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
    ports:
      - "7050:7050"
      - "7053:7053"
    volumes:
      - ./organizations/ordererOrganizations/inec.gov.ng/orderers/orderer.inec.gov.ng/msp:/var/hyperledger/orderer/msp
      - ./organizations/ordererOrganizations/inec.gov.ng/orderers/orderer.inec.gov.ng/tls:/var/hyperledger/orderer/tls
    networks: [inec-fabric]

  peer0.inec.inec.gov.ng:
    image: hyperledger/fabric-peer:2.5.4
    environment:
      - CORE_PEER_ID=peer0.inec.inec.gov.ng
      - CORE_PEER_ADDRESS=peer0.inec.inec.gov.ng:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.inec.inec.gov.ng:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.inec.inec.gov.ng:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.inec.inec.gov.ng:7051
      - CORE_PEER_LOCALMSPID=INECMSP
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb0:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
      - CORE_CHAINCODE_EXTERNALBUILDERS=
    ports:
      - "7051:7051"
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./organizations/peerOrganizations/inec.inec.gov.ng/peers/peer0.inec.inec.gov.ng/msp:/etc/hyperledger/fabric/msp
      - ./organizations/peerOrganizations/inec.inec.gov.ng/peers/peer0.inec.inec.gov.ng/tls:/etc/hyperledger/fabric/tls
    depends_on: [couchdb0]
    networks: [inec-fabric]

  couchdb0:
    image: couchdb:3.3.3
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - "5984:5984"
    networks: [inec-fabric]

  peer0.observers.inec.gov.ng:
    image: hyperledger/fabric-peer:2.5.4
    environment:
      - CORE_PEER_ID=peer0.observers.inec.gov.ng
      - CORE_PEER_ADDRESS=peer0.observers.inec.gov.ng:9051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:9051
      - CORE_PEER_CHAINCODEADDRESS=peer0.observers.inec.gov.ng:9052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:9052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.observers.inec.gov.ng:9051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.observers.inec.gov.ng:9051
      - CORE_PEER_LOCALMSPID=ObserversMSP
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb1:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
    ports:
      - "9051:9051"
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./organizations/peerOrganizations/observers.inec.gov.ng/peers/peer0.observers.inec.gov.ng/msp:/etc/hyperledger/fabric/msp
      - ./organizations/peerOrganizations/observers.inec.gov.ng/peers/peer0.observers.inec.gov.ng/tls:/etc/hyperledger/fabric/tls
    depends_on: [couchdb1]
    networks: [inec-fabric]

  couchdb1:
    image: couchdb:3.3.3
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - "7984:5984"
    networks: [inec-fabric]
