version: "3.9"

services:
  # ── Core Application ──
  go-backend:
    build:
      context: ./inec-go-backend
      dockerfile: Dockerfile
    ports:
      - "8088:8088"
    environment:
      - PORT=8088
      - DB_PATH=/data/app.db
      - REDIS_URL=http://redis:6379
      - KAFKA_REST_URL=http://kafka-rest:8082
      - TEMPORAL_URL=http://temporal:7233
      - DAPR_HTTP_PORT=3500
      - KEYCLOAK_URL=http://keycloak:8080
      - KEYCLOAK_REALM=inec
      - KEYCLOAK_CLIENT_ID=inec-backend
      - PERMIFY_URL=http://permify:3476
      - PERMIFY_TENANT_ID=inec
      - FLUVIO_URL=http://fluvio:9003
      - TIGERBEETLE_URL=http://tigerbeetle-http:3000
      - APISIX_ADMIN_URL=http://apisix:9180
      - APISIX_API_KEY=edd1c9f034335f136f87ad84b625c8f1
      - LAKEHOUSE_URL=http://lakehouse:8090
    volumes:
      - app-data:/data
    depends_on:
      - redis
      - kafka
      - temporal
      - keycloak
      - permify
      - apisix
      - lakehouse
    networks:
      - inec-network

  python-proxy:
    build:
      context: ./inec-backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DB_PATH=/data/app.db
    volumes:
      - app-data:/data
    depends_on:
      - go-backend
    networks:
      - inec-network

  frontend:
    build:
      context: ./inec-frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - python-proxy
    networks:
      - inec-network

  # ── Redis ──
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - inec-network

  # ── Kafka (KRaft mode, no Zookeeper) ──
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093,HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,HOST://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - inec-network

  kafka-rest:
    image: confluentinc/cp-kafka-rest:7.5.0
    ports:
      - "8082:8082"
    environment:
      KAFKA_REST_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_REST_LISTENERS: http://0.0.0.0:8082
    depends_on:
      - kafka
    networks:
      - inec-network

  # ── Temporal ──
  temporal:
    image: temporalio/auto-setup:1.22
    ports:
      - "7233:7233"
    environment:
      - DB=sqlite
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
    volumes:
      - temporal-data:/tmp/temporal
    networks:
      - inec-network

  temporal-ui:
    image: temporalio/ui:2.21.0
    ports:
      - "8233:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal
    networks:
      - inec-network

  # ── Keycloak ──
  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    ports:
      - "8180:8080"
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      - KC_DB=dev-mem
    command: start-dev --import-realm
    volumes:
      - ./config/keycloak:/opt/keycloak/data/import
    networks:
      - inec-network

  # ── Permify ──
  permify:
    image: ghcr.io/permify/permify:latest
    ports:
      - "3476:3476"
      - "3478:3478"
    command: serve
    volumes:
      - permify-data:/tmp/permify
    networks:
      - inec-network

  # ── APISIX ──
  apisix:
    image: apache/apisix:3.7.0-debian
    ports:
      - "9080:9080"
      - "9443:9443"
      - "9180:9180"
    volumes:
      - ./config/apisix/config.yaml:/usr/local/apisix/conf/config.yaml
      - ./config/apisix/apisix.yaml:/usr/local/apisix/conf/apisix.yaml
    depends_on:
      - go-backend
    networks:
      - inec-network

  # ── TigerBeetle ──
  tigerbeetle:
    image: ghcr.io/tigerbeetle/tigerbeetle:0.15.3
    ports:
      - "3001:3001"
    command: start --addresses=0.0.0.0:3001 /data/0_0.tigerbeetle
    volumes:
      - tigerbeetle-data:/data
    networks:
      - inec-network

  # ── Fluvio (SC + SPU) ──
  fluvio-sc:
    image: infinyon/fluvio:0.11.0
    ports:
      - "9003:9003"
    command: run sc --local /fluvio/metadata
    volumes:
      - fluvio-data:/fluvio
    networks:
      - inec-network

  # ── Lakehouse (Python DuckDB Analytics) ──
  lakehouse:
    build:
      context: ./inec-analytics
      dockerfile: Dockerfile
    ports:
      - "8090:8090"
    environment:
      - DB_PATH=/data/app.db
      - PORT=8090
    volumes:
      - app-data:/data
      - lakehouse-data:/lakehouse
    networks:
      - inec-network

  # ── Dapr Sidecar ──
  dapr-sidecar:
    image: daprio/dapr:1.12.0
    command:
      - ./daprd
      - --app-id=inec-backend
      - --app-port=8088
      - --dapr-http-port=3500
      - --dapr-grpc-port=50001
      - --components-path=/components
    volumes:
      - ./config/dapr/components:/components
    depends_on:
      - go-backend
      - redis
      - kafka
    network_mode: "service:go-backend"

volumes:
  app-data:
  redis-data:
  kafka-data:
  temporal-data:
  permify-data:
  tigerbeetle-data:
  fluvio-data:
  lakehouse-data:

networks:
  inec-network:
    driver: bridge
