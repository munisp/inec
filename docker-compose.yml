networks:
  inec-network:
    driver: bridge
services:
  apisix:
    depends_on:
    - etcd
    environment:
    - APISIX_ADMIN_KEY=${APISIX_ADMIN_KEY:-edd1c9f034335f136f87ad84b625c8f1}
    image: apache/apisix:3.7.0-debian
    networks:
    - inec-network
    ports:
    # - 9080:9080
    # - 9443:9443
    - 9180:9180
    volumes:
    - ./config/apisix/config.yaml:/usr/local/apisix/conf/config.yaml
    - ./config/apisix/apisix.yaml:/usr/local/apisix/conf/apisix.yaml
  etcd:
    environment:
    - ALLOW_NONE_AUTHENTICATION=yes
    - ETCD_ADVERTISE_CLIENT_URLS=http://etcd:2379
    - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
    image: bitnami/etcd:3.5.11
    networks:
    - inec-network
    ports:
    - 2379:2379
    volumes:
    - etcd-data:/bitnami/etcd
  biometric-go:
    build:
      context: ./services/biometric-go
      dockerfile: Dockerfile
    depends_on:
      biometric-python:
        condition: service_healthy
      biometric-rust:
        condition: service_healthy
    environment:
    - BIOMETRIC_PYTHON_URL=http://biometric-python:8090
    - BIOMETRIC_RUST_URL=http://biometric-rust:8091
    healthcheck:
      interval: 10s
      retries: 3
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8092/health
      timeout: 5s
    networks:
    - inec-network
    ports:
    - 8092:8092
  biometric-python:
    build:
      context: ./services/biometric-python
      dockerfile: Dockerfile
    environment:
    - WORKERS=4
    healthcheck:
      interval: 10s
      retries: 3
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8090/health
      timeout: 5s
    networks:
    - inec-network
    ports:
    - 8090:8090
  biometric-rust:
    build:
      context: ./services/biometric-rust
      dockerfile: Dockerfile
    environment:
    - RUST_LOG=info
    healthcheck:
      interval: 10s
      retries: 3
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8091/health
      timeout: 5s
    networks:
    - inec-network
    ports:
    - 8091:8091
  dapr-sidecar:
    command:
    - ./daprd
    - --app-id=inec-backend
    - --app-port=8088
    - --dapr-http-port=3500
    - --dapr-grpc-port=50001
    - --components-path=/components
    depends_on:
    - go-backend
    - redis
    - kafka
    image: daprio/dapr:1.12.0
    network_mode: service:go-backend
    volumes:
    - ./config/dapr/components:/components
  fluvio-sc:
    command: run sc --local /fluvio/metadata
    image: infinyon/fluvio:0.11.0
    networks:
    - inec-network
    ports:
    - 9003:9003
    volumes:
    - fluvio-data:/fluvio
  frontend:
    build:
      context: ./inec-frontend
      dockerfile: Dockerfile
    depends_on:
    - python-proxy
    networks:
    - inec-network
    ports:
    - 3000:80
  go-backend:
    build:
      context: ./inec-go-backend
      dockerfile: Dockerfile
    depends_on:
      apisix:
        condition: service_started
      kafka:
        condition: service_started
      keycloak:
        condition: service_started
      lakehouse:
        condition: service_started
      permify:
        condition: service_started
      pgpool:
        condition: service_healthy
      redis:
        condition: service_started
      temporal:
        condition: service_started
    environment:
    - PORT=8088
    - DATABASE_URL=postgres://${PG_USER:-inec_admin}:${PG_PASSWORD}@pgpool:5432/${PG_DB:-inec_db}?sslmode=disable
    - DATABASE_REPLICA_URL=postgres://${PG_USER:-inec_admin}:${PG_PASSWORD}@pg-replica:5432/${PG_DB:-inec_db}?sslmode=disable
    - PGPOOL_HOST=pgpool
    - PGPOOL_PORT=5432
    - PGPOOL_PCP_HOST=pgpool
    - PGPOOL_PCP_PORT=9898
    - REDIS_URL=http://redis:6379
    - KAFKA_REST_URL=http://kafka-rest:8082
    - TEMPORAL_URL=http://temporal:7233
    - DAPR_HTTP_PORT=3500
    - KEYCLOAK_URL=http://keycloak:8080
    - KEYCLOAK_REALM=inec
    - KEYCLOAK_CLIENT_ID=inec-backend
    - PERMIFY_URL=http://permify:3476
    - PERMIFY_TENANT_ID=inec
    - FLUVIO_URL=http://fluvio-sc:9003
    - TIGERBEETLE_URL=http://tigerbeetle:3001
    - OPENAPPSEC_URL=http://openappsec-agent:4000
    - APISIX_ADMIN_URL=http://apisix:9180
    - APISIX_API_KEY=edd1c9f034335f136f87ad84b625c8f1
    - LAKEHOUSE_URL=http://lakehouse:8090
    networks:
    - inec-network
    ports:
    - 8088:8088
    volumes:
    - app-data:/data
  kafka:
    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,HOST://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093,HOST://0.0.0.0:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_NODE_ID: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    image: confluentinc/cp-kafka:7.5.0
    networks:
    - inec-network
    ports:
    - 9092:9092
    - 29092:29092
    volumes:
    - kafka-data:/var/lib/kafka/data
  kafka-rest:
    depends_on:
    - kafka
    environment:
      KAFKA_REST_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_REST_LISTENERS: http://0.0.0.0:8082
    image: confluentinc/cp-kafka-rest:7.5.0
    networks:
    - inec-network
    ports:
    - 8082:8082
  keycloak:
    command: start-dev --import-realm
    environment:
    - KEYCLOAK_ADMIN=admin
    - KEYCLOAK_ADMIN_PASSWORD=admin
    - KC_DB=dev-mem
    image: quay.io/keycloak/keycloak:23.0
    networks:
    - inec-network
    ports:
    - 8180:8080
    volumes:
    - ./config/keycloak:/opt/keycloak/data/import
  lakehouse:
    build:
      context: ./inec-analytics
      dockerfile: Dockerfile
    environment:
    - DB_PATH=/data/app.db
    - PORT=8090
    networks:
    - inec-network
    ports:
    - 8090:8090
    volumes:
    - app-data:/data
    - lakehouse-data:/lakehouse
  permify:
    command: serve
    image: ghcr.io/permify/permify:latest
    networks:
    - inec-network
    ports:
    - 3476:3476
    - 3478:3478
    volumes:
    - permify-data:/tmp/permify
  pg-primary:
    command: postgres -c wal_level=replica -c max_wal_senders=5 -c max_replication_slots=5
      -c hot_standby=on -c shared_buffers=256MB -c effective_cache_size=768MB -c work_mem=8MB
      -c log_min_duration_statement=100
    environment:
      POSTGRES_DB: ${PG_DB:-inec_db}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_USER: ${PG_USER:-inec_admin}
      REPLICATOR_PASSWORD: ${REPLICATOR_PASSWORD}
    healthcheck:
      interval: 5s
      retries: 10
      start_period: 30s
      test:
      - CMD-SHELL
      - pg_isready -U inec_admin -d inec_db
      timeout: 5s
    image: postgres:16-alpine
    networks:
    - inec-network
    volumes:
    - pg-primary-data:/var/lib/postgresql/data
    - ./config/postgres/primary-init.sh:/docker-entrypoint-initdb.d/01-replication.sh
  pg-replica:
    depends_on:
      pg-primary:
        condition: service_healthy
    entrypoint:
    - /bin/bash
    - /replica-entrypoint.sh
    environment:
      PGDATA: /var/lib/postgresql/data
      POSTGRES_DB: ${PG_DB:-inec_db}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_USER: ${PG_USER:-inec_admin}
      REPLICATOR_PASSWORD: ${REPLICATOR_PASSWORD}
    healthcheck:
      interval: 5s
      retries: 10
      start_period: 60s
      test:
      - CMD-SHELL
      - pg_isready -U inec_admin -d inec_db
      timeout: 5s
    image: postgres:16-alpine
    networks:
    - inec-network
    volumes:
    - pg-replica-data:/var/lib/postgresql/data
    - ./config/postgres/replica-entrypoint.sh:/replica-entrypoint.sh
  pgpool:
    depends_on:
      pg-primary:
        condition: service_healthy
    environment:
      PGPOOL_ADMIN_PASSWORD: ${PGPOOL_ADMIN_PASSWORD}
      PGPOOL_ADMIN_USERNAME: ${PGPOOL_ADMIN_USER:-pgpool_admin}
      PGPOOL_AUTO_FAILBACK: 'yes'
      PGPOOL_BACKEND_NODES: 0:pg-primary:5432,1:pg-replica:5432
      PGPOOL_CHILD_LIFE_TIME: '300'
      PGPOOL_CLIENT_IDLE_LIMIT: '300'
      PGPOOL_ENABLE_LOAD_BALANCING: 'yes'
      PGPOOL_ENABLE_POOL_HBA: 'yes'
      PGPOOL_ENABLE_STATEMENT_LOAD_BALANCING: 'yes'
      PGPOOL_MAX_POOL: '4'
      PGPOOL_NUM_INIT_CHILDREN: '64'
      PGPOOL_POSTGRES_PASSWORD: ${PG_PASSWORD}
      PGPOOL_POSTGRES_USERNAME: ${PG_USER:-inec_admin}
      PGPOOL_SR_CHECK_PASSWORD: ${REPLICATOR_PASSWORD}
      PGPOOL_SR_CHECK_USER: replicator
    healthcheck:
      interval: 10s
      retries: 5
      start_period: 30s
      test:
      - CMD-SHELL
      - pg_isready -h localhost -p 5432 -U inec_admin
      timeout: 5s
    image: pgpool/pgpool-ii:4.5
    networks:
    - inec-network
    volumes:
    - ./config/pgpool/pgpool.conf:/etc/pgpool-II/pgpool.conf
    - ./config/pgpool/pool_hba.conf:/etc/pgpool-II/pool_hba.conf
    - ./config/pgpool/failover.sh:/etc/pgpool-II/failover.sh
  python-proxy:
    build:
      context: ./inec-backend
      dockerfile: Dockerfile
    depends_on:
    - go-backend
    environment:
    - DB_PATH=/data/app.db
    networks:
    - inec-network
    ports:
    - 8000:8000
    volumes:
    - app-data:/data
  redis:
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    image: redis:7-alpine
    networks:
    - inec-network
    volumes:
    - redis-data:/data
  temporal:
    environment:
    - DB=sqlite
    - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
    image: temporalio/auto-setup:1.22
    networks:
    - inec-network
    ports:
    - 7233:7233
    volumes:
    - temporal-data:/tmp/temporal
  temporal-ui:
    depends_on:
    - temporal
    environment:
    - TEMPORAL_ADDRESS=temporal:7233
    image: temporalio/ui:2.21.0
    networks:
    - inec-network
    ports:
    - 8233:8080
  tigerbeetle:
    command: start --addresses=0.0.0.0:3001 /data/0_0.tigerbeetle
    image: ghcr.io/tigerbeetle/tigerbeetle:0.15.3
    networks:
    - inec-network
    volumes:
    - tigerbeetle-data:/data
  openappsec-agent:
    build:
      context: ./services/openappsec-agent
      dockerfile: Dockerfile
    environment:
    - PORT=4000
    networks:
    - inec-network
    ports:
    - 4000:4000
  caddy:
    build:
      context: ./caddy
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./config/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./config/caddy/coraza.conf:/etc/caddy/coraza.conf:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - inec-network
    depends_on:
      - redis
      - apisix
      - keycloak
    restart: unless-stopped
    environment:
      - CADDY_ADMIN=0.0.0.0:2019

  geolibre-web:
    build:
      context: ./services/geolibre-web
      dockerfile: Dockerfile
    restart: always
    networks:
      - inec-network

  geolibre-collab:
    build:
      context: ./services/geolibre-collab
      dockerfile: Dockerfile
    restart: always
    networks:
      - inec-network

  # ── Next-Generation Innovation Services ─────────────────────────────────────

  ai-anomaly-detection:
    build:
      context: ./services/ai-anomaly-detection
    restart: always
    networks:
      - inec-network
    environment:
      - PYTHONUNBUFFERED=1

  homomorphic-tally:
    build:
      context: ./services/homomorphic-tally
    restart: always
    networks:
      - inec-network
    environment:
      - TALLY_DECRYPT_TOKEN=${TALLY_DECRYPT_TOKEN:-inec-tally-secret}

  federated-fraud-detection:
    build:
      context: ./services/federated-fraud-detection
    restart: always
    networks:
      - inec-network

  digital-twin-simulation:
    build:
      context: ./services/digital-twin-simulation
    restart: always
    networks:
      - inec-network

  satellite-change-detection:
    build:
      context: ./services/satellite-change-detection
    restart: always
    networks:
      - inec-network

  predictive-resource-allocation:
    build:
      context: ./services/predictive-resource-allocation
    restart: always
    networks:
      - inec-network

  campaign-planning:
    build: ./services/campaign-planning
    container_name: inec_campaign_planning
    restart: unless-stopped
    ports:
      - "8204:8204"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_API_BASE=${OPENAI_API_BASE:-https://api.openai.com/v1}
      - INEC_API_URL=http://inec-backend:8088
    networks:
      - inec-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8204/api/v1/campaign/health"]
      interval: 30s
      timeout: 10s
      retries: 3
volumes:
  caddy-data:
  caddy-config:
  app-data: null
  fluvio-data: null
  kafka-data: null
  lakehouse-data: null
  permify-data: null
  pg-primary-data: null
  pg-replica-data: null
  redis-data: null
  temporal-data: null
  tigerbeetle-data: null
  etcd-data: null
