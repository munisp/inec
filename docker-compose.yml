# INEC Election Platform — Full Microservice Orchestration
#
# Architecture: 12 services (8 Go, 2 Rust, 2 Python) + infrastructure + frontend
#
# Usage:
#   docker compose up -d                  # Start all services
#   docker compose up -d gateway auth-svc # Start specific services
#   docker compose logs -f gateway        # Follow gateway logs
#   docker compose ps                     # View service status
#
# Ports:
#   8085 — middleware-svc (shared Kafka/Redis/Temporal access)
#   8088 — gateway (API entrypoint)
#   8090 — auth-svc
#   8091 — election-svc
#   8092 — biometric-svc
#   8093 — geo-svc
#   8094 — compliance-svc
#   8095 — ingestion-svc
#   8096 — bvas-svc
#   8097 — inference-engine (Rust)
#   8098 — lakehouse-analytics (Python)
#   8099 — document-ai (Python)
#   8100 — fluvio-stream (Rust)
#   3000 — frontend (React PWA)

x-common: &common
  restart: unless-stopped
  networks:
    - inec-net

x-go-env: &go-env
  DATABASE_URL: postgres://ngapp:ngapp123@postgres:5432/ngapp?sslmode=disable
  REDIS_URL: redis:6379
  KAFKA_BROKERS: kafka:9092
  OPENSEARCH_URL: http://opensearch:9200
  APP_ENV: development
  JWT_SECRET: dev-jwt-secret-change-in-production-minimum-32-chars
  # Middleware service URLs
  KEYCLOAK_URL: http://keycloak:8080
  KEYCLOAK_REALM: inec
  KEYCLOAK_CLIENT_ID: inec-backend
  KEYCLOAK_CLIENT_SECRET: inec-backend-secret
  TEMPORAL_URL: http://temporal-ui:8080
  TIGERBEETLE_URL: http://tigerbeetle:3000
  TIGERBEETLE_ADDRESSES: tigerbeetle:3000
  PERMIFY_URL: http://permify:3476
  PERMIFY_TENANT_ID: inec
  APISIX_ADMIN_URL: http://apisix:9180
  APISIX_API_KEY: edd1c9f034335f136f87ad84b625c8f1
  DAPR_HTTP_URL: http://dapr-sidecar:3500
  MOJALOOP_URL: http://mojaloop-ttk:4040
  OPENAPPSEC_URL: http://openappsec-agent:4000
  LAKEHOUSE_URL: http://trino:8080
  FLUVIO_URL: http://fluvio-sc:9003
  FLUVIO_SC_ADDR: fluvio-sc:9003
  # Inter-service URLs
  AUTH_URL: http://auth-svc:8090
  ELECTION_URL: http://election-svc:8091
  BIOMETRIC_URL: http://biometric-svc:8092
  GEO_URL: http://geo-svc:8093
  COMPLIANCE_URL: http://compliance-svc:8094
  INGESTION_URL: http://ingestion-svc:8095
  BVAS_URL: http://bvas-svc:8096
  MIDDLEWARE_URL: http://middleware-svc:8085
  INFERENCE_URL: http://inference-engine:8097
  DOCUMENT_AI_URL: http://document-ai:8099

services:
  # ─── Infrastructure ───────────────────────────────────────────
  postgres:
    <<: *common
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: ngapp
      POSTGRES_PASSWORD: ngapp123
      POSTGRES_DB: ngapp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ngapp"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    <<: *common
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  kafka:
    <<: *common
    image: apache/kafka:3.7.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      CLUSTER_ID: inec-kafka-cluster-001
    ports:
      - "9094:9094"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  neo4j:
    <<: *common
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/neo4jpassword
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4jdata:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  opensearch:
    <<: *common
    image: opensearchproject/opensearch:2.17.0
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - osdata:/var/lib/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\"'"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Middleware Services ───────────────────────────────────────
  keycloak:
    <<: *common
    image: quay.io/keycloak/keycloak:26.0
    command: ["start-dev", "--import-realm"]
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/ngapp
      KC_DB_USERNAME: ngapp
      KC_DB_PASSWORD: ngapp123
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: "8080"
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8180:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080;echo -e 'GET /health/ready HTTP/1.1\r\nhost: localhost\r\nConnection: close\r\n\r\n' >&3;cat <&3 | grep -q 200"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  temporal:
    <<: *common
    image: temporalio/auto-setup:1.24
    environment:
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_USER: ngapp
      POSTGRES_PWD: ngapp123
      POSTGRES_SEEDS: postgres
    ports:
      - "7233:7233"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "cluster", "health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s

  temporal-ui:
    <<: *common
    image: temporalio/ui:2.31.2
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    ports:
      - "8233:8080"
    depends_on:
      temporal:
        condition: service_started

  tigerbeetle:
    <<: *common
    image: ghcr.io/tigerbeetle/tigerbeetle:0.16.11
    privileged: true
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if [ ! -f /data/0_0.tigerbeetle ]; then
          ./tigerbeetle format --cluster=0 --replica=0 --replica-count=1 /data/0_0.tigerbeetle
        fi
        exec ./tigerbeetle start --addresses=0.0.0.0:3000 /data/0_0.tigerbeetle
    ports:
      - "3000:3000"
    volumes:
      - tbdata:/data
    healthcheck:
      test: ["CMD-SHELL", "echo 'ok'"]
      interval: 10s
      timeout: 5s
      retries: 3

  permify:
    <<: *common
    image: ghcr.io/permify/permify:v1.2.5
    command: ["serve"]
    environment:
      PERMIFY_DATABASE_ENGINE: postgres
      PERMIFY_DATABASE_URI: "postgres://ngapp:ngapp123@postgres:5432/ngapp"
    ports:
      - "3476:3476"
      - "3478:3478"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3476/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  etcd:
    <<: *common
    image: quay.io/coreos/etcd:v3.5.17
    command: ["etcd", "--advertise-client-urls=http://etcd:2379", "--listen-client-urls=http://0.0.0.0:2379"]
    ports:
      - "2379:2379"
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health", "--endpoints=http://localhost:2379"]
      interval: 10s
      timeout: 5s
      retries: 5

  apisix:
    <<: *common
    image: apache/apisix:3.9.1-debian
    volumes:
      - ./apisix-conf/config.yaml:/usr/local/apisix/conf/config.yaml:ro
    ports:
      - "9080:9080"
      - "9180:9180"
      - "9443:9443"
    depends_on:
      etcd:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9080/ -o /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  dapr-sidecar:
    <<: *common
    image: daprio/daprd:1.14.4
    command: ["./daprd",
      "--app-id", "inec-backend",
      "--dapr-http-port", "3500",
      "--dapr-grpc-port", "50001",
      "--resources-path", "/components",
      "--app-port", "8088"
    ]
    volumes:
      - ./dapr-components:/components:ro
    ports:
      - "3500:3500"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3500/v1.0/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  openappsec-agent:
    <<: *common
    build:
      context: ./services/openappsec-agent
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  mojaloop-ttk:
    <<: *common
    image: mojaloop/ml-testing-toolkit:v18.5.1
    ports:
      - "4040:4040"
      - "5050:5050"
    environment:
      - AUTH_ENABLED=FALSE
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:4040/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  fluvio-sc:
    <<: *common
    image: infinyon/fluvio:stable
    hostname: fluvio-sc
    command: "./fluvio-run sc --local /fluvio/metadata"
    volumes:
      - fluvio-metadata:/fluvio/metadata
    ports:
      - "9103:9003"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9003 || exit 0"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  fluvio-spu:
    <<: *common
    image: infinyon/fluvio:stable
    hostname: fluvio-spu
    command: "./fluvio-run spu -i 5001 -p fluvio-spu:9010 -v fluvio-spu:9011 --sc-addr fluvio-sc:9004 --log-base-dir /fluvio/data"
    volumes:
      - fluvio-data:/fluvio/data
    ports:
      - "9110:9010"
      - "9111:9011"
    depends_on:
      - fluvio-sc

  trino:
    <<: *common
    image: trinodb/trino:467
    ports:
      - "8191:8080"
    environment:
      - TRINO_ENVIRONMENT=development
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/v1/info | grep -q '\"starting\":false' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─── Go Microservices ─────────────────────────────────────────
  gateway:
    <<: *common
    build:
      context: ./inec-go-backend
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: gateway
    ports:
      - "8088:8088"
    environment:
      <<: *go-env
      PORT: "8088"
    command: ["./service", "--port=8088", "--distributed"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-svc:
        condition: service_started
      election-svc:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  auth-svc:
    <<: *common
    build:
      context: ./inec-go-backend
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: auth-svc
    ports:
      - "8090:8090"
    environment:
      <<: *go-env
      PORT: "8090"
    command: ["./service", "--port=8090"]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  election-svc:
    <<: *common
    build:
      context: ./inec-go-backend
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: election-svc
    ports:
      - "8091:8091"
    environment:
      <<: *go-env
      PORT: "8091"
    command: ["./service", "--port=8091"]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8091/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  biometric-svc:
    <<: *common
    build:
      context: ./inec-go-backend
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: biometric-svc
    ports:
      - "8092:8092"
    environment:
      <<: *go-env
      PORT: "8092"
    command: ["./service", "--port=8092"]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8092/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  geo-svc:
    <<: *common
    build:
      context: ./inec-go-backend
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: geo-svc
    ports:
      - "8093:8093"
    environment:
      <<: *go-env
      PORT: "8093"
    command: ["./service", "--port=8093"]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8093/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  compliance-svc:
    <<: *common
    build:
      context: ./inec-go-backend
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: compliance-svc
    ports:
      - "8094:8094"
    environment:
      <<: *go-env
      PORT: "8094"
    command: ["./service", "--port=8094"]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8094/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  ingestion-svc:
    <<: *common
    build:
      context: ./inec-go-backend
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: ingestion-svc
    ports:
      - "8095:8095"
    environment:
      <<: *go-env
      PORT: "8095"
    command: ["./service", "--port=8095"]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8095/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  bvas-svc:
    <<: *common
    build:
      context: ./inec-go-backend
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: bvas-svc
    ports:
      - "8096:8096"
    environment:
      <<: *go-env
      PORT: "8096"
    command: ["./service", "--port=8096"]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8096/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  middleware-svc:
    <<: *common
    build:
      context: ./inec-go-backend
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: middleware-svc
    ports:
      - "8085:8085"
    environment:
      <<: *go-env
      PORT: "8085"
    command: ["./service", "--port=8085"]
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─── Rust Microservices ───────────────────────────────────────
  inference-engine:
    <<: *common
    build:
      context: ./services/inference-engine
      dockerfile: Dockerfile
    ports:
      - "8097:8097"
    environment:
      PORT: "8097"
      DATABASE_URL: postgres://ngapp:ngapp123@postgres:5432/ngapp?sslmode=disable
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: neo4jpassword
      AUTH_URL: http://auth-svc:8090
      LAKEHOUSE_URL: http://lakehouse-analytics:8098
      MIDDLEWARE_URL: http://middleware-svc:8085
      GEO_URL: http://geo-svc:8093
      RUST_LOG: info
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8097/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  fluvio-stream:
    <<: *common
    build:
      context: ./services/fluvio-stream
      dockerfile: Dockerfile
    ports:
      - "8100:8100"
    environment:
      PORT: "8100"
      KAFKA_BROKERS: kafka:9092
      INFERENCE_URL: http://inference-engine:8097
      ELECTION_URL: http://election-svc:8091
      COMPLIANCE_URL: http://compliance-svc:8094
      RUST_LOG: info
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─── Python Microservices ─────────────────────────────────────
  lakehouse-analytics:
    <<: *common
    build:
      context: ./services/lakehouse-analytics
      dockerfile: Dockerfile
    ports:
      - "8098:8098"
    environment:
      PORT: "8098"
      DATABASE_URL: postgres://ngapp:ngapp123@postgres:5432/ngapp?sslmode=disable
      AUTH_URL: http://auth-svc:8090
      ELECTION_URL: http://election-svc:8091
      GEO_URL: http://geo-svc:8093
      INFERENCE_URL: http://inference-engine:8097
      MIDDLEWARE_URL: http://middleware-svc:8085
      COMPLIANCE_URL: http://compliance-svc:8094
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8098/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  document-ai:
    <<: *common
    build:
      context: ./services/document-ai
      dockerfile: Dockerfile
    ports:
      - "8099:8099"
    environment:
      PORT: "8099"
      AUTH_URL: http://auth-svc:8090
      ELECTION_URL: http://election-svc:8091
      COMPLIANCE_URL: http://compliance-svc:8094
      MIDDLEWARE_URL: http://middleware-svc:8085
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8099/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─── Frontend ─────────────────────────────────────────────────
  frontend:
    <<: *common
    build:
      context: ./inec-frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8088

volumes:
  pgdata:
  neo4jdata:
  osdata:
  tbdata:
  fluvio-metadata:
  fluvio-data:

networks:
  inec-net:
    driver: bridge
