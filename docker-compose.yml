networks:
  inec-network:
    driver: bridge
services:
  # OpenAppSec's APISIX attachment is the actual traffic enforcement point.
  # Caddy proxies /api traffic to this service, then the attachment invokes the
  # OpenAppSec agent before APISIX forwards the request to platform services.
  apisix:
    depends_on:
      openappsec-agent:
        condition: service_started
    environment:
    - APISIX_STAND_ALONE=true
    - APISIX_ADMIN_KEY=${APISIX_ADMIN_KEY:?APISIX_ADMIN_KEY must be set}
    image: ghcr.io/openappsec/apisix-attachment:${APPSEC_VERSION:?APPSEC_VERSION must be set}
    networks:
    - inec-network
    ports:
    - 9180:9180
    volumes:
    - ./config/apisix/config.yaml:/usr/local/apisix/conf/config.yaml:ro
    - ./config/apisix/apisix.yaml:/usr/local/apisix/conf/apisix.yaml:ro
  etcd:
    environment:
    - ALLOW_NONE_AUTHENTICATION=yes
    - ETCD_ADVERTISE_CLIENT_URLS=http://etcd:2379
    - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
    image: bitnami/etcd:3.5.11
    networks:
    - inec-network
    ports:
    - 2379:2379
    volumes:
    - etcd-data:/bitnami/etcd
  biometric-go:
    build:
      context: ./services/biometric-go
      dockerfile: Dockerfile
    depends_on:
      biometric-python:
        condition: service_healthy
      biometric-rust:
        condition: service_healthy
      pgpool:
        condition: service_healthy
    environment:
    - DATABASE_URL=postgres://${PG_USER:?PG_USER must be set}:${PG_PASSWORD:?PG_PASSWORD must be set}@pgpool:5432/${PG_DB:?PG_DB must be set}?sslmode=disable
    - BIOMETRIC_PYTHON_URL=http://biometric-python:8090
    - BIOMETRIC_RUST_URL=http://biometric-rust:8091
    healthcheck:
      interval: 10s
      retries: 3
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8092/health
      timeout: 5s
    networks:
    - inec-network
    ports:
    - 8092:8092
  biometric-python:
    build:
      context: ./services/biometric-python
      dockerfile: Dockerfile
    depends_on:
      inference-engine:
        condition: service_healthy
      pgpool:
        condition: service_healthy
    environment:
    - WORKERS=4
    - DATABASE_URL=postgres://${PG_USER:?PG_USER must be set}:${PG_PASSWORD:?PG_PASSWORD must be set}@pgpool:5432/${PG_DB:?PG_DB must be set}?sslmode=disable
    - INFERENCE_ENGINE_URL=${INFERENCE_ENGINE_URL:?INFERENCE_ENGINE_URL must be set}
    healthcheck:
      interval: 10s
      retries: 3
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8090/health
      timeout: 5s
    networks:
    - inec-network
    ports:
    - 8090:8090
  biometric-rust:
    build:
      context: ./services/biometric-rust
      dockerfile: Dockerfile
    environment:
    - RUST_LOG=info
    healthcheck:
      interval: 10s
      retries: 3
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8091/health
      timeout: 5s
    networks:
    - inec-network
    ports:
    - 8091:8091
  dapr-sidecar:
    command:
    - ./daprd
    - --app-id=inec-backend
    - --app-port=8088
    - --dapr-http-port=3500
    - --dapr-grpc-port=50001
    - --components-path=/components
    depends_on:
    - go-backend
    - redis
    - kafka
    image: daprio/dapr:1.12.0
    network_mode: service:go-backend
    volumes:
    - ./config/dapr/components:/components
  fluvio-sc:
    command: run sc --local /fluvio/metadata
    image: infinyon/fluvio:latest
    networks:
    - inec-network
    ports:
    - 9003:9003
    restart: unless-stopped
    volumes:
    - fluvio-data:/fluvio
  fluvio-stream:
    build:
      context: ./services/fluvio-stream
      dockerfile: Dockerfile
    depends_on:
      fluvio-sc:
        condition: service_started
    environment:
    - FLUVIO_ENDPOINT=fluvio-sc:9003
    - PORT=8100
    - CHECKPOINT_FILE=/data/fluvio_offsets.json
    healthcheck:
      interval: 10s
      retries: 10
      start_period: 30s
      test:
      - CMD
      - curl
      - -fsS
      - http://localhost:8100/health
      timeout: 5s
    networks:
    - inec-network
    restart: on-failure
    volumes:
    - fluvio-bridge-data:/data
  frontend:
    build:
      context: ./inec-frontend
      dockerfile: Dockerfile
    depends_on:
      go-backend:
        condition: service_started
    networks:
    - inec-network
    ports:
    - 3000:80
  go-backend:
    build:
      context: ./inec-go-backend
      dockerfile: Dockerfile
    depends_on:
      apisix:
        condition: service_started
      kafka:
        condition: service_started
      keycloak:
        condition: service_started
      lakehouse:
        condition: service_started
      permify:
        condition: service_started
      pgpool:
        condition: service_healthy
      redis:
        condition: service_started
      temporal:
        condition: service_started
      inference-engine:
        condition: service_started
      biometric-go:
        condition: service_healthy
      fluvio-stream:
        condition: service_healthy
      satellite-change-detection:
        condition: service_started
      document-ai:
        condition: service_healthy
      campaign-planning:
        condition: service_healthy
    environment:
    - PORT=8088
    - DATABASE_URL=postgres://${PG_USER:?PG_USER must be set}:${PG_PASSWORD:?PG_PASSWORD must be set}@pgpool:5432/${PG_DB:?PG_DB must be set}?sslmode=disable
    - DATABASE_REPLICA_URL=postgres://${PG_USER:?PG_USER must be set}:${PG_PASSWORD:?PG_PASSWORD must be set}@pg-replica:5432/${PG_DB:?PG_DB must be set}?sslmode=disable
    - PGPOOL_HOST=pgpool
    - PGPOOL_PORT=5432
    - PGPOOL_PCP_HOST=pgpool
    - PGPOOL_PCP_PORT=9898
    - REDIS_URL=redis://redis:6379/0
    - KAFKA_BROKERS=kafka:29092
    - TEMPORAL_HOST_PORT=temporal:7233
    - TEMPORAL_NAMESPACE=default
    - DAPR_HTTP_PORT=3500
    - KEYCLOAK_URL=http://keycloak:8080
    - KEYCLOAK_REALM=inec
    - KEYCLOAK_CLIENT_ID=inec-backend
    - PERMIFY_URL=http://permify:3476
    - PERMIFY_TENANT_ID=inec
    - FLUVIO_STREAM_URL=http://fluvio-stream:8100
    - TIGERBEETLE_URL=http://tigerbeetle:3001
    - OPENAPPSEC_GATEWAY_ENFORCED=true
    - APISIX_ADMIN_URL=http://apisix:9180
    - APISIX_API_KEY=${APISIX_ADMIN_KEY:?APISIX_ADMIN_KEY must be set}
    - HSM_MASTER_KEY=${HSM_MASTER_KEY:?HSM_MASTER_KEY must be set}
    - LAKEHOUSE_URL=http://lakehouse:8090
    - RUST_INFERENCE_URL=http://inference-engine:8091
    - BIOMETRIC_PIPELINE_URL=http://biometric-go:8092
    - SATELLITE_SERVICE_URL=http://satellite-change-detection:8204
    - DOCUMENT_AI_URL=http://document-ai:8089
    - CAMPAIGN_PLANNING_URL=http://campaign-planning:8206
    networks:
    - inec-network
    ports:
    - 8088:8088
    volumes:
    - app-data:/data
  document-ai:
    build:
      context: ./services/document-ai
      dockerfile: Dockerfile
    depends_on:
      inference-engine:
        condition: service_healthy
    environment:
    - VLM_ENDPOINT=${VLM_ENDPOINT:?VLM_ENDPOINT must be set}
    - VLM_MODEL=${VLM_MODEL:?VLM_MODEL must be set}
    - BIOMETRIC_LIVENESS_URL=http://inference-engine:8091/liveness/predict
    - CORS_ORIGINS=${CORS_ORIGINS:?CORS_ORIGINS must be set}
    - UPLOAD_DIR=/tmp/document-ai-uploads
    healthcheck:
      interval: 30s
      retries: 5
      start_period: 90s
      test:
      - CMD
      - python
      - -c
      - import urllib.request; urllib.request.urlopen('http://localhost:8089/health')
      timeout: 10s
    networks:
    - inec-network
    restart: unless-stopped
  inference-engine:
    build:
      context: .
      dockerfile: ./services/inference-engine/Dockerfile
    environment:
    - PORT=8091
    - MODELS_DIR=/app/models
    - CORS_ORIGINS=https://inec.local,http://localhost:3000
    networks:
    - inec-network
    restart: unless-stopped
  kafka:
    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,HOST://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093,HOST://0.0.0.0:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_NODE_ID: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    image: confluentinc/cp-kafka:7.5.0
    networks:
    - inec-network
    ports:
    - 9092:9092
    - 29092:29092
    volumes:
    - kafka-data:/var/lib/kafka/data
  kafka-rest:
    depends_on:
    - kafka
    environment:
      KAFKA_REST_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_REST_LISTENERS: http://0.0.0.0:8082
    image: confluentinc/cp-kafka-rest:7.5.0
    networks:
    - inec-network
    ports:
    - 8082:8082
  keycloak:
    depends_on:
      pg-primary:
        condition: service_healthy
    entrypoint: ["/bin/bash", "/opt/keycloak/import-realm.sh"]
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:?KEYCLOAK_ADMIN must be set}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?KEYCLOAK_ADMIN_PASSWORD must be set}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:?KEYCLOAK_CLIENT_SECRET must be set}
      INEC_ADMIN_PASSWORD: ${INEC_ADMIN_PASSWORD:?INEC_ADMIN_PASSWORD must be set}
      OFFICER_PASSWORD: ${OFFICER_PASSWORD:?OFFICER_PASSWORD must be set}
      OBSERVER_PASSWORD: ${OBSERVER_PASSWORD:?OBSERVER_PASSWORD must be set}
      KC_DB: postgres
      KC_DB_URL_HOST: pg-primary
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: ${PG_USER:?PG_USER must be set}
      KC_DB_PASSWORD: ${PG_PASSWORD:?PG_PASSWORD must be set}
      KC_HEALTH_ENABLED: "true"
    image: quay.io/keycloak/keycloak:23.0
    networks:
    - inec-network
    ports:
    - 8180:8080
    volumes:
    - ./config/keycloak/inec-realm.json:/opt/keycloak/data/import-template/inec-realm.json:ro
    - ./config/keycloak/import-realm.sh:/opt/keycloak/import-realm.sh:ro
  lakehouse:
    build:
      context: ./services/lakehouse-analytics
      dockerfile: Dockerfile
    depends_on:
      pgpool:
        condition: service_healthy
    environment:
    - DATABASE_URL=postgres://${PG_USER:?PG_USER must be set}:${PG_PASSWORD:?PG_PASSWORD must be set}@pgpool:5432/${PG_DB:?PG_DB must be set}?sslmode=disable
    - DUCKDB_PATH=/data/inec_lakehouse.duckdb
    - MODEL_DIR=/data/models
    - PORT=8090
    networks:
    - inec-network
    ports:
    - 8090:8090
    volumes:
    - lakehouse-data:/data
  permify:
    command: serve
    image: ghcr.io/permify/permify:latest
    networks:
    - inec-network
    ports:
    - 3476:3476
    - 3478:3478
    volumes:
    - permify-data:/tmp/permify
  pg-primary:
    command: postgres -c wal_level=replica -c max_wal_senders=5 -c max_replication_slots=5
      -c hot_standby=on -c shared_buffers=256MB -c effective_cache_size=768MB -c work_mem=8MB
      -c log_min_duration_statement=100
    environment:
      POSTGRES_DB: ${PG_DB:?PG_DB must be set}
      POSTGRES_PASSWORD: ${PG_PASSWORD:?PG_PASSWORD must be set}
      POSTGRES_USER: ${PG_USER:?PG_USER must be set}
      REPLICATOR_PASSWORD: ${REPLICATOR_PASSWORD}
    healthcheck:
      interval: 5s
      retries: 10
      start_period: 30s
      test:
      - CMD-SHELL
      - pg_isready -U inec_admin -d inec_db
      timeout: 5s
    image: postgres:16-alpine
    networks:
    - inec-network
    volumes:
    - pg-primary-data:/var/lib/postgresql/data
    - ./config/postgres/primary-init.sh:/docker-entrypoint-initdb.d/01-replication.sh
  pg-replica:
    depends_on:
      pg-primary:
        condition: service_healthy
    entrypoint:
    - /bin/bash
    - /replica-entrypoint.sh
    environment:
      PGDATA: /var/lib/postgresql/data
      POSTGRES_DB: ${PG_DB:?PG_DB must be set}
      POSTGRES_PASSWORD: ${PG_PASSWORD:?PG_PASSWORD must be set}
      POSTGRES_USER: ${PG_USER:?PG_USER must be set}
      REPLICATOR_PASSWORD: ${REPLICATOR_PASSWORD}
    healthcheck:
      interval: 5s
      retries: 10
      start_period: 60s
      test:
      - CMD-SHELL
      - pg_isready -U inec_admin -d inec_db
      timeout: 5s
    image: postgres:16-alpine
    networks:
    - inec-network
    volumes:
    - pg-replica-data:/var/lib/postgresql/data
    - ./config/postgres/replica-entrypoint.sh:/replica-entrypoint.sh
  pgpool:
    depends_on:
      pg-primary:
        condition: service_healthy
    environment:
      PGPOOL_ADMIN_PASSWORD: ${PGPOOL_ADMIN_PASSWORD}
      PGPOOL_ADMIN_USERNAME: ${PGPOOL_ADMIN_USER:?PGPOOL_ADMIN_USER must be set}
      PGPOOL_AUTO_FAILBACK: 'yes'
      PGPOOL_BACKEND_NODES: 0:pg-primary:5432,1:pg-replica:5432
      PGPOOL_CHILD_LIFE_TIME: '300'
      PGPOOL_CLIENT_IDLE_LIMIT: '300'
      PGPOOL_ENABLE_LOAD_BALANCING: 'yes'
      PGPOOL_ENABLE_POOL_HBA: 'yes'
      PGPOOL_ENABLE_STATEMENT_LOAD_BALANCING: 'yes'
      PGPOOL_MAX_POOL: '4'
      PGPOOL_NUM_INIT_CHILDREN: '64'
      PGPOOL_POSTGRES_PASSWORD: ${PG_PASSWORD:?PG_PASSWORD must be set}
      PGPOOL_POSTGRES_USERNAME: ${PG_USER:?PG_USER must be set}
      PGPOOL_SR_CHECK_PASSWORD: ${REPLICATOR_PASSWORD}
      PGPOOL_SR_CHECK_USER: replicator
    healthcheck:
      interval: 10s
      retries: 5
      start_period: 30s
      test:
      - CMD-SHELL
      - pg_isready -h localhost -p 5432 -U inec_admin
      timeout: 5s
    image: pgpool/pgpool-ii:4.5
    networks:
    - inec-network
    volumes:
    - ./config/pgpool/pgpool.conf:/etc/pgpool-II/pgpool.conf
    - ./config/pgpool/pool_hba.conf:/etc/pgpool-II/pool_hba.conf
    - ./config/pgpool/failover.sh:/etc/pgpool-II/failover.sh
  redis:
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    image: redis:7-alpine
    networks:
    - inec-network
    volumes:
    - redis-data:/data
  temporal:
    depends_on:
      pg-primary:
        condition: service_healthy
    environment:
    - DB=postgres12
    - POSTGRES_SEEDS=pg-primary
    - DB_PORT=5432
    - POSTGRES_USER=${PG_USER:?PG_USER must be set}
    - POSTGRES_PWD=${PG_PASSWORD:?PG_PASSWORD must be set}
    - DBNAME=temporal
    - VISIBILITY_DBNAME=temporal_visibility
    - DYNAMIC_CONFIG_FILE_PATH=/etc/temporal/config/dynamicconfig/docker.yaml
    image: temporalio/auto-setup:1.22
    networks:
    - inec-network
    ports:
    - 7233:7233
  temporal-ui:
    depends_on:
    - temporal
    environment:
    - TEMPORAL_ADDRESS=temporal:7233
    image: temporalio/ui:2.21.0
    networks:
    - inec-network
    ports:
    - 8233:8080
  tigerbeetle:
    cap_add:
    - IPC_LOCK
    entrypoint: ["/bin/sh", "-ec"]
    command:
    - |
      if [ ! -f /data/0_0.tigerbeetle ]; then
        /tigerbeetle format --cluster=0 --replica=0 --replica-count=1 /data/0_0.tigerbeetle
      fi
      exec /tigerbeetle start --addresses=0.0.0.0:3001 /data/0_0.tigerbeetle
    image: ghcr.io/tigerbeetle/tigerbeetle:0.15.3
    networks:
    - inec-network
    restart: unless-stopped
    security_opt:
    - seccomp=unconfined
    volumes:
    - tigerbeetle-data:/data
  # Official OpenAppSec standalone services. The agent is paired with the
  # APISIX attachment above; it is not an application-level inspection API.
  openappsec-agent:
    command: /cp-nano-agent
    environment:
    - SHARED_STORAGE_HOST=openappsec-shared-storage
    - LEARNING_HOST=openappsec-smartsync
    - TUNING_HOST=openappsec-tuning
    - autoPolicyLoad=true
    - registered_server=APISIX
    image: ghcr.io/openappsec/agent:${APPSEC_VERSION:?APPSEC_VERSION must be set}
    ipc: host
    networks:
    - inec-network
    restart: unless-stopped
    volumes:
    - ./config/openappsec/agent-config:/etc/cp/conf
    - ./data/openappsec/agent:/etc/cp/data
    - ./logs/openappsec:/var/log/nano_agent
    - ./config/openappsec/policy.yaml:/ext/appsec/local_policy.yaml:ro
  openappsec-smartsync:
    environment:
    - SHARED_STORAGE_HOST=openappsec-shared-storage
    image: ghcr.io/openappsec/smartsync:${APPSEC_VERSION:?APPSEC_VERSION must be set}
    networks:
    - inec-network
    restart: unless-stopped
  openappsec-shared-storage:
    image: ghcr.io/openappsec/smartsync-shared-files:${APPSEC_VERSION:?APPSEC_VERSION must be set}
    ipc: host
    networks:
    - inec-network
    restart: unless-stopped
    user: root
    volumes:
    - openappsec-shared-storage:/db
  openappsec-tuning:
    depends_on:
    - openappsec-db
    - openappsec-shared-storage
    environment:
    - SHARED_STORAGE_HOST=openappsec-shared-storage
    - QUERY_DB_HOST=openappsec-db
    - QUERY_DB_USER=appsec
    - QUERY_DB_PASSWORD=${OPENAPPSEC_DB_PASSWORD:?set OPENAPPSEC_DB_PASSWORD}
    image: ghcr.io/openappsec/smartsync-tuning:${APPSEC_VERSION:?APPSEC_VERSION must be set}
    networks:
    - inec-network
    restart: unless-stopped
    volumes:
    - ./config/openappsec/agent-config:/etc/cp/conf
  openappsec-db:
    environment:
    - POSTGRES_DB=openappsec
    - POSTGRES_USER=appsec
    - POSTGRES_PASSWORD=${OPENAPPSEC_DB_PASSWORD:?set OPENAPPSEC_DB_PASSWORD}
    image: postgres:16-alpine
    networks:
    - inec-network
    restart: unless-stopped
    volumes:
    - openappsec-db-data:/var/lib/postgresql/data
  caddy:
    build:
      context: ./caddy
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./config/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./config/caddy/coraza.conf:/etc/caddy/coraza.conf:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - inec-network
    depends_on:
      - redis
      - apisix
      - keycloak
    restart: unless-stopped
    environment:
      - CADDY_ADMIN=0.0.0.0:2019

  geolibre-web:
    build:
      context: ./services/geolibre-web
      dockerfile: Dockerfile
    restart: always
    networks:
      - inec-network

  geolibre-collab:
    build:
      context: ./services/geolibre-collab
      dockerfile: Dockerfile
    restart: always
    networks:
      - inec-network

  # ── Next-Generation Innovation Services ─────────────────────────────────────

  ai-anomaly-detection:
    build:
      context: ./services/ai-anomaly-detection
    restart: always
    networks:
      - inec-network
    environment:
      - PYTHONUNBUFFERED=1
      - INFERENCE_ENGINE_URL=${INFERENCE_ENGINE_URL:?INFERENCE_ENGINE_URL must be set}
      - CORS_ORIGINS=${CORS_ORIGINS:?CORS_ORIGINS must be set}
    depends_on:
      inference-engine:
        condition: service_healthy

  homomorphic-tally:
    build:
      context: ./services/homomorphic-tally
    restart: always
    networks:
      - inec-network
    environment:
      - TALLY_DECRYPT_TOKEN=${TALLY_DECRYPT_TOKEN:?TALLY_DECRYPT_TOKEN must be set}

  federated-fraud-detection:
    build:
      context: ./services/federated-fraud-detection
    restart: always
    networks:
      - inec-network

  digital-twin-simulation:
    build:
      context: ./services/digital-twin-simulation
    restart: always
    networks:
      - inec-network

  satellite-change-detection:
    build:
      context: ./services/satellite-change-detection
    restart: always
    environment:
    - PORT=8204
    - STAC_API_URL=${STAC_API_URL:?STAC_API_URL must be set}
    - STAC_COLLECTION=${STAC_COLLECTION:?STAC_COLLECTION must be set}
    - STAC_PREVIEW_ASSET=${STAC_PREVIEW_ASSET:?STAC_PREVIEW_ASSET must be set}
    - STAC_MAX_CLOUD_COVER=${STAC_MAX_CLOUD_COVER:?STAC_MAX_CLOUD_COVER must be set}
    networks:
    - inec-network

  predictive-resource-allocation:
    build:
      context: ./services/predictive-resource-allocation
    depends_on:
      pgpool:
        condition: service_healthy
    restart: always
    environment:
    - PORT=8205
    - DATABASE_URL=postgres://${PG_USER:?PG_USER must be set}:${PG_PASSWORD:?PG_PASSWORD must be set}@pgpool:5432/${PG_DB:?PG_DB must be set}?sslmode=disable
    - MODEL_DIR=/data/models
    - MIN_TRAINING_SAMPLES=${MIN_TRAINING_SAMPLES:?MIN_TRAINING_SAMPLES must be set}
    - RESOURCE_BALLOT_BUFFER=${RESOURCE_BALLOT_BUFFER:?RESOURCE_BALLOT_BUFFER must be set}
    - RESOURCE_VOTERS_PER_CLERK=${RESOURCE_VOTERS_PER_CLERK:?RESOURCE_VOTERS_PER_CLERK must be set}
    - RESOURCE_MIN_POLL_CLERKS=${RESOURCE_MIN_POLL_CLERKS:?RESOURCE_MIN_POLL_CLERKS must be set}
    - RESOURCE_MIN_SECURITY_PERSONNEL=${RESOURCE_MIN_SECURITY_PERSONNEL:?RESOURCE_MIN_SECURITY_PERSONNEL must be set}
    - CORS_ORIGINS=${CORS_ORIGINS:?CORS_ORIGINS must be set}
    healthcheck:
      interval: 30s
      retries: 5
      test:
      - CMD
      - python
      - -c
      - import urllib.request; urllib.request.urlopen('http://localhost:8205/api/v1/allocation/health')
      timeout: 10s
    networks:
      - inec-network
    volumes:
      - resource-allocation-data:/data

  campaign-planning:
    build: ./services/campaign-planning
    container_name: inec_campaign_planning
    depends_on:
      pgpool:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "8206:8206"
    environment:
      - PORT=8206
      - DATABASE_URL=postgres://${PG_USER:?PG_USER must be set}:${PG_PASSWORD:?PG_PASSWORD must be set}@pgpool:5432/${PG_DB:?PG_DB must be set}?sslmode=disable
      - OPENAI_API_KEY=${OPENAI_API_KEY:?OPENAI_API_KEY must be set}
      - OPENAI_API_BASE=${OPENAI_API_BASE:?OPENAI_API_BASE must be set}
      - OPENAI_MODEL=${OPENAI_MODEL:?OPENAI_MODEL must be set}
      - INEC_API_URL=http://go-backend:8088
      - CORS_ORIGINS=${CORS_ORIGINS:?CORS_ORIGINS must be set}
    networks:
      - inec-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8206/api/v1/campaign/health"]
      interval: 30s
      timeout: 10s
      retries: 3
