# INEC Election Platform — Full Microservice Orchestration
#
# Architecture: 12 services (8 Go, 2 Rust, 2 Python) + infrastructure + frontend
#
# Usage:
#   docker compose up -d                  # Start all services
#   docker compose up -d gateway auth-svc # Start specific services
#   docker compose logs -f gateway        # Follow gateway logs
#   docker compose ps                     # View service status
#
# Ports:
#   8085 — middleware-svc (shared Kafka/Redis/Temporal access)
#   8088 — gateway (API entrypoint)
#   8090 — auth-svc
#   8091 — election-svc
#   8092 — biometric-svc
#   8093 — geo-svc
#   8094 — compliance-svc
#   8095 — ingestion-svc
#   8096 — bvas-svc
#   8097 — inference-engine (Rust)
#   8098 — lakehouse-analytics (Python)
#   8099 — document-ai (Python)
#   8100 — fluvio-stream (Rust)
#   3000 — frontend (React PWA)

x-common: &common
  restart: unless-stopped
  networks:
    - inec-net

x-go-env: &go-env
  DATABASE_URL: postgres://ngapp:ngapp123@postgres:5432/ngapp?sslmode=disable
  REDIS_URL: redis:6379
  KAFKA_BROKERS: kafka:9092
  APP_ENV: development
  JWT_SECRET: dev-jwt-secret-change-in-prod
  # Inter-service URLs
  AUTH_URL: http://auth-svc:8090
  ELECTION_URL: http://election-svc:8091
  BIOMETRIC_URL: http://biometric-svc:8092
  GEO_URL: http://geo-svc:8093
  COMPLIANCE_URL: http://compliance-svc:8094
  INGESTION_URL: http://ingestion-svc:8095
  BVAS_URL: http://bvas-svc:8096
  MIDDLEWARE_URL: http://middleware-svc:8085
  INFERENCE_URL: http://inference-engine:8097
  LAKEHOUSE_URL: http://lakehouse-analytics:8098
  DOCUMENT_AI_URL: http://document-ai:8099
  FLUVIO_URL: http://fluvio-stream:8100

services:
  # ─── Infrastructure ───────────────────────────────────────────
  postgres:
    <<: *common
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: ngapp
      POSTGRES_PASSWORD: ngapp123
      POSTGRES_DB: ngapp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ngapp"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    <<: *common
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  kafka:
    <<: *common
    image: bitnami/kafka:3.7
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Go Microservices ─────────────────────────────────────────
  gateway:
    <<: *common
    build:
      context: ./inec-go-backend
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: gateway
    ports:
      - "8088:8088"
    environment:
      <<: *go-env
      PORT: "8088"
    command: ["./service", "--port=8088", "--distributed"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-svc:
        condition: service_started
      election-svc:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  auth-svc:
    <<: *common
    build:
      context: ./inec-go-backend
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: auth-svc
    ports:
      - "8090:8090"
    environment:
      <<: *go-env
      PORT: "8090"
    command: ["./service", "--port=8090"]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  election-svc:
    <<: *common
    build:
      context: ./inec-go-backend
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: election-svc
    ports:
      - "8091:8091"
    environment:
      <<: *go-env
      PORT: "8091"
    command: ["./service", "--port=8091"]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8091/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  biometric-svc:
    <<: *common
    build:
      context: ./inec-go-backend
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: biometric-svc
    ports:
      - "8092:8092"
    environment:
      <<: *go-env
      PORT: "8092"
    command: ["./service", "--port=8092"]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8092/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  geo-svc:
    <<: *common
    build:
      context: ./inec-go-backend
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: geo-svc
    ports:
      - "8093:8093"
    environment:
      <<: *go-env
      PORT: "8093"
    command: ["./service", "--port=8093"]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8093/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  compliance-svc:
    <<: *common
    build:
      context: ./inec-go-backend
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: compliance-svc
    ports:
      - "8094:8094"
    environment:
      <<: *go-env
      PORT: "8094"
    command: ["./service", "--port=8094"]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8094/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  ingestion-svc:
    <<: *common
    build:
      context: ./inec-go-backend
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: ingestion-svc
    ports:
      - "8095:8095"
    environment:
      <<: *go-env
      PORT: "8095"
    command: ["./service", "--port=8095"]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8095/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  bvas-svc:
    <<: *common
    build:
      context: ./inec-go-backend
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: bvas-svc
    ports:
      - "8096:8096"
    environment:
      <<: *go-env
      PORT: "8096"
    command: ["./service", "--port=8096"]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8096/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  middleware-svc:
    <<: *common
    build:
      context: ./inec-go-backend
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: middleware-svc
    ports:
      - "8085:8085"
    environment:
      <<: *go-env
      PORT: "8085"
    command: ["./service", "--port=8085"]
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─── Rust Microservices ───────────────────────────────────────
  inference-engine:
    <<: *common
    build:
      context: ./services/inference-engine
      dockerfile: Dockerfile
    ports:
      - "8097:8097"
    environment:
      PORT: "8097"
      DATABASE_URL: postgres://ngapp:ngapp123@postgres:5432/ngapp?sslmode=disable
      AUTH_URL: http://auth-svc:8090
      LAKEHOUSE_URL: http://lakehouse-analytics:8098
      MIDDLEWARE_URL: http://middleware-svc:8085
      GEO_URL: http://geo-svc:8093
      RUST_LOG: info
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8097/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  fluvio-stream:
    <<: *common
    build:
      context: ./services/fluvio-stream
      dockerfile: Dockerfile
    ports:
      - "8100:8100"
    environment:
      PORT: "8100"
      KAFKA_BROKERS: kafka:9092
      INFERENCE_URL: http://inference-engine:8097
      ELECTION_URL: http://election-svc:8091
      COMPLIANCE_URL: http://compliance-svc:8094
      RUST_LOG: info
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─── Python Microservices ─────────────────────────────────────
  lakehouse-analytics:
    <<: *common
    build:
      context: ./services/lakehouse-analytics
      dockerfile: Dockerfile
    ports:
      - "8098:8098"
    environment:
      PORT: "8098"
      DATABASE_URL: postgres://ngapp:ngapp123@postgres:5432/ngapp?sslmode=disable
      AUTH_URL: http://auth-svc:8090
      ELECTION_URL: http://election-svc:8091
      GEO_URL: http://geo-svc:8093
      INFERENCE_URL: http://inference-engine:8097
      MIDDLEWARE_URL: http://middleware-svc:8085
      COMPLIANCE_URL: http://compliance-svc:8094
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8098/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  document-ai:
    <<: *common
    build:
      context: ./services/document-ai
      dockerfile: Dockerfile
    ports:
      - "8099:8099"
    environment:
      PORT: "8099"
      AUTH_URL: http://auth-svc:8090
      ELECTION_URL: http://election-svc:8091
      COMPLIANCE_URL: http://compliance-svc:8094
      MIDDLEWARE_URL: http://middleware-svc:8085
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8099/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─── Frontend ─────────────────────────────────────────────────
  frontend:
    <<: *common
    build:
      context: ./inec-frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8088

volumes:
  pgdata:

networks:
  inec-net:
    driver: bridge
