  caddy-data:
  caddy-config:
  app-data: null
  fluvio-data: null
  fluvio-bridge-data: null
  kafka-data: null
  lakehouse-data: null
  permify-data: null
  pg-primary-data: null
  pg-replica-data: null
  redis-data: null
  temporal-data: null
  tigerbeetle-data: null
  etcd-data: null
  openappsec-shared-storage: null
  openappsec-db-data: null
  resource-allocation-data: null
