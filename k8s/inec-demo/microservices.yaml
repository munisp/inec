  name: inference-engine
  namespace: inec
  labels:
    app.kubernetes.io/name: inference-engine
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: inference-engine
  template:
