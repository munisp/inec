apiVersion: v1
kind: Service
metadata:
  name: campaign-planning
  namespace: inec
  labels:
    app.kubernetes.io/name: campaign-planning
spec:
  selector:
    app.kubernetes.io/name: campaign-planning
  ports:
    - name: http
      port: 8206
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: campaign-planning
  namespace: inec
  labels:
    app.kubernetes.io/name: campaign-planning
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: campaign-planning
  template:
    metadata:
      labels:
        app.kubernetes.io/name: campaign-planning
    spec:
      imagePullSecrets:
        - name: talentgraph-auth-pull
      containers:
        - name: campaign-planning
          image: registry.digitalocean.com/talentgraph-auth/campaign-planning:archive-20260722-010210
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8206
          env:
            - name: PORT
              value: "8206"
          readinessProbe:
            httpGet:
              path: /api/v1/campaign/health
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/v1/campaign/health
              port: http
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
---
