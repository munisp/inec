    restoreToOriginalReplicaCount: true
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: lakehouse-analytics-http
  namespace: inec
  labels:
    app: lakehouse-analytics
    scaler: keda
spec:
  scaleTargetRef:
    name: lakehouse-analytics
  pollingInterval: 30
  cooldownPeriod: 300
  minReplicaCount: 1
  maxReplicaCount: 4
  fallback:
    failureThreshold: 3
    replicas: 1
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://prometheus.observability.svc.cluster.local:9090
        metricName: lakehouse_rps
        query: sum(rate(http_requests_total{job="lakehouse-analytics"}[5m]))
        threshold: "10"
        activationThreshold: "2"
    - type: cpu
      metricType: Utilization
      metadata:
        value: "60"
---
# KEDA TriggerAuthentication for Kafka SASL
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: kafka-auth
  namespace: inec
spec:
  secretTargetRef: []
