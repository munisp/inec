# KEDA ScaledObjects for INEC Platform
# Requires: KEDA operator installed in cluster (keda namespace)
# Provides event-driven autoscaling based on Kafka consumer lag and HTTP request rate.
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: inec-backend-kafka
  namespace: inec
  labels:
    app: inec-backend
    scaler: keda
spec:
  scaleTargetRef:
    name: inec-backend
  pollingInterval: 15
  cooldownPeriod: 120
  minReplicaCount: 3
  maxReplicaCount: 20
  fallback:
    failureThreshold: 3
    replicas: 5
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: kafka-0.kafka-headless.inec.svc.cluster.local:9092
        consumerGroup: inec-backend
        topic: inec.results.submitted
        lagThreshold: "100"
        activationLagThreshold: "10"
      authenticationRef:
        name: kafka-auth
    - type: kafka
      metadata:
        bootstrapServers: kafka-0.kafka-headless.inec.svc.cluster.local:9092
        consumerGroup: inec-backend
        topic: inec.audit.log
        lagThreshold: "200"
        activationLagThreshold: "20"
      authenticationRef:
        name: kafka-auth
    - type: prometheus
      metadata:
        serverAddress: http://prometheus.observability.svc.cluster.local:9090
        metricName: http_requests_per_second
        query: sum(rate(http_requests_total{job="inec-backend"}[2m]))
        threshold: "50"
        activationThreshold: "10"
  advanced:
    restoreToOriginalReplicaCount: true
    horizontalPodAutoscalerConfig:
      behavior:
        scaleUp:
          stabilizationWindowSeconds: 0
          policies:
            - type: Percent
              value: 100
              periodSeconds: 30
            - type: Pods
              value: 4
              periodSeconds: 30
          selectPolicy: Max
        scaleDown:
          stabilizationWindowSeconds: 300
          policies:
            - type: Percent
              value: 25
              periodSeconds: 60
          selectPolicy: Min
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: gotv-svc-kafka
  namespace: inec
  labels:
    app: gotv-svc
    scaler: keda
spec:
  scaleTargetRef:
    name: gotv-svc
  pollingInterval: 10
  cooldownPeriod: 60
  minReplicaCount: 2
  maxReplicaCount: 15
  fallback:
    failureThreshold: 3
    replicas: 3
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: kafka-0.kafka-headless.inec.svc.cluster.local:9092
        consumerGroup: gotv-svc
        topic: gotv.rides.requested
        lagThreshold: "50"
        activationLagThreshold: "5"
      authenticationRef:
        name: kafka-auth
    - type: kafka
      metadata:
        bootstrapServers: kafka-0.kafka-headless.inec.svc.cluster.local:9092
        consumerGroup: gotv-svc
        topic: gotv.canvass.events
        lagThreshold: "100"
        activationLagThreshold: "10"
      authenticationRef:
        name: kafka-auth
    - type: kafka
      metadata:
        bootstrapServers: kafka-0.kafka-headless.inec.svc.cluster.local:9092
        consumerGroup: gotv-svc
        topic: gotv.dispatch.events
        lagThreshold: "75"
        activationLagThreshold: "10"
      authenticationRef:
        name: kafka-auth
    - type: prometheus
      metadata:
        serverAddress: http://prometheus.observability.svc.cluster.local:9090
        metricName: gotv_http_rps
        query: sum(rate(gotv_http_requests_total{job="gotv-svc"}[2m]))
        threshold: "100"
        activationThreshold: "20"
  advanced:
    restoreToOriginalReplicaCount: true
    horizontalPodAutoscalerConfig:
      behavior:
        scaleUp:
          stabilizationWindowSeconds: 0
          policies:
            - type: Percent
              value: 100
              periodSeconds: 15
            - type: Pods
              value: 5
              periodSeconds: 15
          selectPolicy: Max
        scaleDown:
          stabilizationWindowSeconds: 180
          policies:
            - type: Percent
              value: 25
              periodSeconds: 60
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: gotv-engine-http
  namespace: inec
  labels:
    app: gotv-engine
    scaler: keda
spec:
  scaleTargetRef:
    name: gotv-engine
  pollingInterval: 10
  cooldownPeriod: 60
  minReplicaCount: 2
  maxReplicaCount: 10
  fallback:
    failureThreshold: 3
    replicas: 3
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://prometheus.observability.svc.cluster.local:9090
        metricName: gotv_engine_rps
        query: sum(rate(http_requests_total{job="gotv-engine"}[2m]))
        threshold: "80"
        activationThreshold: "15"
    - type: prometheus
      metadata:
        serverAddress: http://prometheus.observability.svc.cluster.local:9090
        metricName: gotv_ride_match_latency
        query: histogram_quantile(0.95, sum(rate(ride_match_duration_seconds_bucket{job="gotv-engine"}[5m])) by (le))
        threshold: "1.5"
        activationThreshold: "0.5"
  advanced:
    restoreToOriginalReplicaCount: true
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: inference-engine-http
  namespace: inec
  labels:
    app: inference-engine
    scaler: keda
spec:
  scaleTargetRef:
    name: inference-engine
  pollingInterval: 15
  cooldownPeriod: 120
  minReplicaCount: 2
  maxReplicaCount: 8
  fallback:
    failureThreshold: 3
    replicas: 3
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://prometheus.observability.svc.cluster.local:9090
        metricName: inference_rps
        query: sum(rate(http_requests_total{job="inference-engine"}[2m]))
        threshold: "30"
        activationThreshold: "5"
    - type: cpu
      metricType: Utilization
      metadata:
        value: "60"
  advanced:
    restoreToOriginalReplicaCount: true
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: fluvio-stream-kafka
  namespace: inec
  labels:
    app: fluvio-stream
    scaler: keda
spec:
  scaleTargetRef:
    name: fluvio-stream
  pollingInterval: 10
  cooldownPeriod: 60
  minReplicaCount: 1
  maxReplicaCount: 6
  fallback:
    failureThreshold: 3
    replicas: 2
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://prometheus.observability.svc.cluster.local:9090
        metricName: fluvio_produce_rps
        query: sum(rate(http_requests_total{job="fluvio-stream", path="/produce"}[2m]))
        threshold: "40"
        activationThreshold: "5"
  advanced:
    restoreToOriginalReplicaCount: true
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: gotv-analytics-http
  namespace: inec
  labels:
    app: gotv-analytics
    scaler: keda
spec:
  scaleTargetRef:
    name: gotv-analytics
  pollingInterval: 15
  cooldownPeriod: 120
  minReplicaCount: 2
  maxReplicaCount: 8
  fallback:
    failureThreshold: 3
    replicas: 2
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://prometheus.observability.svc.cluster.local:9090
        metricName: analytics_rps
        query: sum(rate(http_requests_total{job="gotv-analytics"}[2m]))
        threshold: "25"
        activationThreshold: "5"
    - type: cpu
      metricType: Utilization
      metadata:
