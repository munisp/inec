name: INEC Platform CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-lint-build:
    name: Go Backend - Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: inec-go-backend/go.sum
      - name: Vet
        working-directory: inec-go-backend
        run: go vet ./...
      - name: Build
        working-directory: inec-go-backend
        run: CGO_ENABLED=1 go build -o inec-server ./...
      - name: Test
        working-directory: inec-go-backend
        run: go test -v -race -coverprofile=coverage.out ./...
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: inec-go-backend/coverage.out

  frontend-lint-build:
    name: Frontend - Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: inec-frontend/package-lock.json
      - name: Install
        working-directory: inec-frontend
        run: npm ci
      - name: Lint
        working-directory: inec-frontend
        run: npm run lint || true
      - name: Type check
        working-directory: inec-frontend
        run: npx tsc --noEmit || true
      - name: Build
        working-directory: inec-frontend
        run: npm run build

  python-analytics:
    name: Python Analytics - Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        working-directory: services/lakehouse-analytics
        run: pip install -e ".[dev]" || pip install -e .
      - name: Lint
        working-directory: services/lakehouse-analytics
        run: |
          pip install ruff
          ruff check .
      - name: Test imports
        working-directory: services/lakehouse-analytics
        run: python -c "from main import app; print('FastAPI app loaded')"

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-lint-build, frontend-lint-build]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t inec-backend ./inec-go-backend
      - name: Build frontend image
        run: docker build -t inec-frontend ./inec-frontend
      - name: Build analytics image
        run: docker build -t inec-analytics ./services/lakehouse-analytics

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [backend-lint-build]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ngapp
          POSTGRES_PASSWORD: ngapp123
          POSTGRES_DB: ngapp
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Run integration tests
        working-directory: inec-go-backend
        env:
          DATABASE_URL: postgresql://ngapp:ngapp123@localhost:5432/ngapp?sslmode=disable
          REDIS_ADDR: localhost:6379
        run: go test -v -tags integration -run TestIntegration ./...
