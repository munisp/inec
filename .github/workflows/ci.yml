name: INEC Platform CI

on:
  push:
    branches: [main, 'devin/**']
  pull_request:
    # Run on PRs into any branch so checks gate every merge, not just main.
    branches: ['**']
  workflow_dispatch:

jobs:
  backend-lint-build:
    name: Go Backend - Lint & Build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: ngapp
          POSTGRES_PASSWORD: ngapp
          POSTGRES_DB: ngapp
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: inec-go-backend/go.sum
      - name: Install HSM toolchain (SoftHSM/PKCS#11)
        run: |
          sudo apt-get update
          sudo apt-get install -y softhsm2 libltdl7
      - name: Initialise SoftHSM token
        run: |
          export SOFTHSM2_CONF=$HOME/softhsm2.conf
          mkdir -p $HOME/softhsm2-tokens
          printf 'directories.tokendir = %s/softhsm2-tokens\nobjectstore.backend = file\nlog.level = ERROR\n' "$HOME" > $SOFTHSM2_CONF
          softhsm2-util --init-token --slot 0 --label INEC_CI --so-pin 3737 --pin 1234
      - name: Vet
        working-directory: inec-go-backend
        run: go vet ./...
      - name: Build
        working-directory: inec-go-backend
        run: CGO_ENABLED=1 go build -o inec-server ./...
      - name: Test
        working-directory: inec-go-backend
        env:
          DATABASE_URL: postgresql://ngapp:ngapp@localhost:5432/ngapp?sslmode=disable
          SOFTHSM2_CONF: /home/runner/softhsm2.conf
          HSM_PKCS11_LIB: /usr/lib/softhsm/libsofthsm2.so
          HSM_PKCS11_PIN: '1234'
          HSM_PKCS11_TOKEN_LABEL: INEC_CI
        run: CGO_ENABLED=1 go test -v -race -coverprofile=coverage.out ./...
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: inec-go-backend/coverage.out

  go-middleware-build:
    name: Go Middleware Engine - Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: services/go-throughput-engine/go.sum
      - name: Build
        working-directory: services/go-throughput-engine
        run: CGO_ENABLED=0 go build -o /dev/null ./...

  go-biometric-build:
    name: Go Biometric Service - Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: services/biometric-go/go.sum
      - name: Build
        working-directory: services/biometric-go
        run: CGO_ENABLED=0 go build -o /dev/null ./...

  rust-build:
    name: Rust Services - Check & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            services/rust-hot-path
            services/biometric-rust
      - name: Check rust-hot-path
        working-directory: services/rust-hot-path
        run: cargo check
      - name: Check biometric-rust
        working-directory: services/biometric-rust
        run: cargo check
      - name: Test biometric-rust
        working-directory: services/biometric-rust
        run: cargo test

  python-biometric:
    name: Python Biometric Service - Lint & Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        working-directory: services/biometric-python
        run: |
          pip install --no-cache-dir ruff
          pip install --no-cache-dir opencv-python-headless numpy structlog pydantic fastapi uvicorn prometheus-client Pillow
          pip install --no-cache-dir onnxruntime || true
      - name: Lint
        working-directory: services/biometric-python
        run: ruff check --select E,F,I .
      - name: Compile check
        working-directory: services/biometric-python
        run: python -m py_compile service.py && python -m py_compile ml_inference.py && python -m py_compile pad_engine.py

  python-middleware:
    name: Python Pipeline Optimizer - Lint & Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        working-directory: services/python-pipeline-optimizer
        run: pip install --no-cache-dir ruff duckdb pyarrow structlog
      - name: Lint
        working-directory: services/python-pipeline-optimizer
        run: ruff check --select E,F,I .
      - name: Compile check
        working-directory: services/python-pipeline-optimizer
        run: |
          for f in *.py; do python -m py_compile "$f"; done

  python-analytics:
    name: Python Analytics - Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        working-directory: services/lakehouse-analytics
        run: pip install -e ".[dev]" || pip install -e .
      - name: Lint
        working-directory: services/lakehouse-analytics
        run: |
          pip install ruff
          ruff check .
      - name: Test imports
        working-directory: services/lakehouse-analytics
        run: python -c "from main import app; print('FastAPI app loaded')"

  frontend-lint-build:
    name: Frontend - Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: inec-frontend/package-lock.json
      - name: Install
        working-directory: inec-frontend
        run: npm ci
      - name: Lint
        working-directory: inec-frontend
        run: npm run lint
      - name: Type check
        working-directory: inec-frontend
        run: npx tsc --noEmit
      - name: Build
        working-directory: inec-frontend
        run: npm run build

  mobile-typecheck:
    name: Mobile App - Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: inec-mobile/package-lock.json
      - name: Install
        working-directory: inec-mobile
        run: npm ci
      - name: Type check
        working-directory: inec-mobile
        run: npx tsc --noEmit

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true
      - name: Check for secrets
        run: |
          # Scan for accidentally committed secrets
          echo "Scanning for hardcoded secrets..."
          ! grep -rn "AKIA[0-9A-Z]\{16\}" --include="*.go" --include="*.py" --include="*.ts" --include="*.tsx" . || echo "WARNING: Possible AWS key found"
          ! grep -rn "ghp_[a-zA-Z0-9]\{36\}" --include="*.go" --include="*.py" --include="*.ts" --include="*.tsx" . || echo "WARNING: Possible GitHub token found"
          echo "Secret scan complete"

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-lint-build, frontend-lint-build, rust-build, python-biometric]
    permissions:
      packages: write
      contents: read
    strategy:
      matrix:
        include:
          - image: inec-backend
            context: inec-go-backend
            dockerfile: inec-go-backend/Dockerfile
          - image: inec-frontend
            context: inec-frontend
            dockerfile: inec-frontend/Dockerfile
          - image: inec-biometric-python
            context: services/biometric-python
            dockerfile: services/biometric-python/Dockerfile
          # Built from the repo root: the Rust vault embeds the shared
          # migrations/ SQL via include_str!, which lives outside its dir.
          - image: inec-biometric-rust
            context: .
            dockerfile: services/biometric-rust/Dockerfile
          - image: inec-biometric-go
            context: services/biometric-go
            dockerfile: services/biometric-go/Dockerfile
          - image: inec-analytics
            context: services/lakehouse-analytics
            dockerfile: services/lakehouse-analytics/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - name: Build ${{ matrix.image }}
        run: docker build -t ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ github.sha }} -f ${{ matrix.dockerfile }} ${{ matrix.context }}
      - name: Push to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ github.sha }}
          docker tag ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ github.sha }} ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest
          docker push ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [backend-lint-build, frontend-lint-build]
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: ngapp
          POSTGRES_PASSWORD: ngapp
          POSTGRES_DB: ngapp
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Build backend
        working-directory: inec-go-backend
        run: CGO_ENABLED=1 go build -o inec-server ./...
      - name: Start backend
        working-directory: inec-go-backend
        run: ./inec-server &
        env:
          PORT: '8088'
          DATABASE_URL: postgresql://ngapp:ngapp@localhost:5432/ngapp?sslmode=disable
      - name: Install frontend
        working-directory: inec-frontend
        run: npm ci
      - name: Start frontend dev server
        working-directory: inec-frontend
        run: npx vite --port 5173 &
      - name: Wait for frontend
        run: |
          for i in $(seq 1 60); do
            curl -sf http://localhost:5173 > /dev/null && break || sleep 1
          done
      - name: Install E2E deps
        working-directory: e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Run E2E tests
        continue-on-error: true
        working-directory: e2e
        run: npx playwright test
        env:
          BASE_URL: http://localhost:5173
          API_URL: http://localhost:8088
      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report
          path: e2e/playwright-report/

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [backend-lint-build]
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: ngapp
          POSTGRES_PASSWORD: ngapp
          POSTGRES_DB: ngapp
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Run integration tests
        working-directory: inec-go-backend
        env:
          DATABASE_URL: postgresql://ngapp:ngapp@localhost:5432/ngapp?sslmode=disable
          REDIS_ADDR: localhost:6379
        run: go test -v -tags integration -run TestIntegration ./...

  load-testing:
    name: Load Testing
    runs-on: ubuntu-latest
    needs: [backend-lint-build]
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: ngapp
          POSTGRES_PASSWORD: ngapp
          POSTGRES_DB: ngapp
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Build backend
        working-directory: inec-go-backend
        run: CGO_ENABLED=1 go build -o inec-server ./...
      - name: Start backend
        working-directory: inec-go-backend
        run: ./inec-server &
        env:
          PORT: '8099'
          DATABASE_URL: postgresql://ngapp:ngapp@localhost:5432/ngapp?sslmode=disable
      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8099/health && break || sleep 1
          done
      - name: Run load tests
        run: |
          go install github.com/rakyll/hey@latest
          echo "=== Dashboard endpoint (read-heavy) ==="
          hey -n 2000 -c 50 -t 10 http://localhost:8099/dashboard | tail -20
          echo "=== Results endpoint ==="
          hey -n 2000 -c 50 -t 10 http://localhost:8099/results | tail -20
          echo "=== Elections list ==="
          hey -n 1000 -c 25 -t 10 http://localhost:8099/elections | tail -20
          echo "=== Health check ==="
          hey -n 5000 -c 100 -t 10 http://localhost:8099/health | tail -20
