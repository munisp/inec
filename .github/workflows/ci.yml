name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
    - name: Install dependencies
      run: cd inec-go-backend && go mod download
    - name: Build
      run: cd inec-go-backend && CGO_ENABLED=1 go build -v ./...
    - name: Test
      run: cd inec-go-backend && CGO_ENABLED=1 go test -v ./...

  build-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install dependencies
      run: cd inec-frontend && npm install --legacy-peer-deps
    - name: Build
      run: cd inec-frontend && npm run build
