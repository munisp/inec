name: INEC Platform CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-lint-build:
    name: Go Backend - Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: inec-go-backend/go.sum
      - name: Vet
        working-directory: inec-go-backend
        run: go vet ./...
      - name: Build
        working-directory: inec-go-backend
        run: CGO_ENABLED=1 go build -o inec-server ./...
      - name: Test
        working-directory: inec-go-backend
        run: go test -v -race -coverprofile=coverage.out ./...
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: inec-go-backend/coverage.out

  frontend-lint-build:
    name: Frontend - Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: inec-frontend/package-lock.json
      - name: Install
        working-directory: inec-frontend
        run: npm ci
      - name: Lint
        working-directory: inec-frontend
        run: npm run lint
      - name: Type check
        working-directory: inec-frontend
        run: npx tsc --noEmit
      - name: Build
        working-directory: inec-frontend
        run: npm run build

  python-analytics:
    name: Python Analytics - Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        working-directory: services/lakehouse-analytics
        run: pip install -e ".[dev]" || pip install -e .
      - name: Lint
        working-directory: services/lakehouse-analytics
        run: |
          pip install ruff
          ruff check .
      - name: Test imports
        working-directory: services/lakehouse-analytics
        run: python -c "from main import app; print('FastAPI app loaded')"

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-lint-build, frontend-lint-build]
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t ghcr.io/${{ github.repository_owner }}/inec-backend:${{ github.sha }} ./inec-go-backend
      - name: Build frontend image
        run: docker build -t ghcr.io/${{ github.repository_owner }}/inec-frontend:${{ github.sha }} ./inec-frontend
      - name: Build analytics image
        run: docker build -t ghcr.io/${{ github.repository_owner }}/inec-analytics:${{ github.sha }} ./services/lakehouse-analytics
      - name: Push images to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push ghcr.io/${{ github.repository_owner }}/inec-backend:${{ github.sha }}
          docker push ghcr.io/${{ github.repository_owner }}/inec-frontend:${{ github.sha }}
          docker push ghcr.io/${{ github.repository_owner }}/inec-analytics:${{ github.sha }}
          docker tag ghcr.io/${{ github.repository_owner }}/inec-backend:${{ github.sha }} ghcr.io/${{ github.repository_owner }}/inec-backend:latest
          docker tag ghcr.io/${{ github.repository_owner }}/inec-frontend:${{ github.sha }} ghcr.io/${{ github.repository_owner }}/inec-frontend:latest
          docker tag ghcr.io/${{ github.repository_owner }}/inec-analytics:${{ github.sha }} ghcr.io/${{ github.repository_owner }}/inec-analytics:latest
          docker push ghcr.io/${{ github.repository_owner }}/inec-backend:latest
          docker push ghcr.io/${{ github.repository_owner }}/inec-frontend:latest
          docker push ghcr.io/${{ github.repository_owner }}/inec-analytics:latest

  mobile-typecheck:
    name: Mobile App - Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: inec-mobile/package-lock.json
      - name: Install
        working-directory: inec-mobile
        run: npm ci
      - name: Type check
        working-directory: inec-mobile
        run: npx tsc --noEmit

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [backend-lint-build, frontend-lint-build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Build backend
        working-directory: inec-go-backend
        run: CGO_ENABLED=1 go build -o inec-server ./...
      - name: Start backend
        working-directory: inec-go-backend
        run: ./inec-server &
        env:
          PORT: '8088'
      - name: Install frontend
        working-directory: inec-frontend
        run: npm ci
      - name: Start frontend dev server
        working-directory: inec-frontend
        run: npx vite --port 5173 &
      - name: Wait for frontend
        run: |
          for i in $(seq 1 60); do
            curl -sf http://localhost:5173 > /dev/null && break || sleep 1
          done
      - name: Install E2E deps
        working-directory: e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Run E2E tests
        working-directory: e2e
        run: npx playwright test
        env:
          BASE_URL: http://localhost:5173
          API_URL: http://localhost:8088
      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report
          path: e2e/playwright-report/

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [backend-lint-build]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ngapp
          POSTGRES_PASSWORD: ngapp123
          POSTGRES_DB: ngapp
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Run integration tests
        working-directory: inec-go-backend
        env:
          DATABASE_URL: postgresql://ngapp:ngapp123@localhost:5432/ngapp?sslmode=disable
          REDIS_ADDR: localhost:6379
        run: go test -v -tags integration -run TestIntegration ./...

  load-testing:
    name: Load Testing
    runs-on: ubuntu-latest
    needs: [backend-lint-build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Build backend
        working-directory: inec-go-backend
        run: CGO_ENABLED=1 go build -o inec-server ./...
      - name: Start backend
        working-directory: inec-go-backend
        run: ./inec-server &
        env:
          PORT: '8099'
      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8099/health && break || sleep 1
          done
      - name: Run load tests
        run: |
          go install github.com/rakyll/hey@latest
          echo "=== Dashboard endpoint (read-heavy) ==="
          hey -n 2000 -c 50 -t 10 http://localhost:8099/dashboard | tail -20
          echo "=== Results endpoint ==="
          hey -n 2000 -c 50 -t 10 http://localhost:8099/results | tail -20
          echo "=== Elections list ==="
          hey -n 1000 -c 25 -t 10 http://localhost:8099/elections | tail -20
          echo "=== Health check ==="
          hey -n 5000 -c 100 -t 10 http://localhost:8099/health | tail -20
