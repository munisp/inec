name: INEC Platform CD

on:
  push:
    branches: [main]
    tags: ['v*']

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/inec

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-backend:
    name: Build & Push Backend Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_PREFIX }}-backend
          tags: |
            type=sha
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./inec-go-backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    name: Build & Push Frontend Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_PREFIX }}-frontend
          tags: |
            type=sha
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./inec-frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy to Staging
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_STAGING }}
          aws-region: af-south-1

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name inec-staging --region af-south-1

      - name: Deploy with Helm
        run: |
          helm upgrade --install inec ./helm/inec-platform \
            --namespace inec --create-namespace \
            --set global.environment=staging \
            --set backend.image.tag=${{ needs.build-backend.outputs.image_tag }} \
            --set frontend.image.tag=${{ needs.build-backend.outputs.image_tag }} \
            --values helm/inec-platform/values.yaml \
            --values helm/inec-platform/values-staging.yaml \
            --wait --timeout 10m

      - name: Run smoke tests
        run: |
          STAGING_URL=$(kubectl get ingress -n inec -o jsonpath='{.items[0].status.loadBalancer.ingress[0].hostname}')
          curl -sf "https://${STAGING_URL}/healthz" | jq .
          curl -sf "https://${STAGING_URL}/readiness" | jq .

      - name: Run database migrations
        run: |
          kubectl exec -n inec deploy/inec-backend -- /app/inec-server --migrate-only

  deploy-production:
    name: Deploy to Production
    needs: [build-backend, build-frontend, deploy-staging]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PRODUCTION }}
          aws-region: af-south-1

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name inec-production --region af-south-1

      - name: Deploy canary (10%)
        run: |
          helm upgrade --install inec ./helm/inec-platform \
            --namespace inec \
            --set global.environment=production \
            --set backend.image.tag=${{ needs.build-backend.outputs.image_tag }} \
            --set frontend.image.tag=${{ needs.build-backend.outputs.image_tag }} \
            --set backend.canary.enabled=true \
            --set backend.canary.weight=10 \
            --values helm/inec-platform/values.yaml \
            --wait --timeout 15m

      - name: Canary health check (5 min)
        run: |
          for i in $(seq 1 30); do
            STATUS=$(kubectl get pods -n inec -l app=inec-backend-canary -o jsonpath='{.items[0].status.phase}')
            if [ "$STATUS" != "Running" ]; then
              echo "Canary unhealthy: $STATUS — rolling back"
              helm rollback inec -n inec
              exit 1
            fi
            sleep 10
          done
          echo "Canary healthy for 5 minutes"

      - name: Promote to full production
        run: |
          helm upgrade --install inec ./helm/inec-platform \
            --namespace inec \
            --set global.environment=production \
            --set backend.image.tag=${{ needs.build-backend.outputs.image_tag }} \
            --set frontend.image.tag=${{ needs.build-backend.outputs.image_tag }} \
            --set backend.canary.enabled=false \
            --values helm/inec-platform/values.yaml \
            --wait --timeout 15m

      - name: Verify production
        run: |
          kubectl rollout status deployment/inec-backend -n inec --timeout=5m
          kubectl rollout status deployment/inec-frontend -n inec --timeout=5m
