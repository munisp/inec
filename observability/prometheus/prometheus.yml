global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: "inec-backend"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["inec-backend:8088"]
    # In Kubernetes, use service discovery:
    # kubernetes_sd_configs:
    #   - role: pod
    #     namespaces:
    #       names: ["inec"]
    # relabel_configs:
    #   - source_labels: [__meta_kubernetes_pod_label_app]
    #     regex: inec-backend
    #     action: keep

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]
