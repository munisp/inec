{{- if .Values.canary.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-backend-canary
  labels:
    app.kubernetes.io/name: inec-backend
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: backend-canary
    track: canary
spec:
  replicas: {{ .Values.canary.replicas | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: inec-backend
      app.kubernetes.io/instance: {{ .Release.Name }}
      track: canary
  template:
    metadata:
      labels:
        app.kubernetes.io/name: inec-backend
        app.kubernetes.io/instance: {{ .Release.Name }}
        track: canary
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: {{ .Release.Name }}-backend
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: backend
          image: "{{ .Values.canary.image.repository | default .Values.backend.image.repository }}:{{ .Values.canary.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            {{- range $key, $value := .Values.backend.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            - name: CANARY_DEPLOYMENT
              value: "true"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: inec-db-credentials
                  key: password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: inec-jwt-secret
                  key: secret
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.canary.resources | default .Values.backend.resources | nindent 12 }}
---
# Canary service (separate from stable for weighted routing)
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-backend-canary
  labels:
    track: canary
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: inec-backend
    app.kubernetes.io/instance: {{ .Release.Name }}
    track: canary
{{- end }}
