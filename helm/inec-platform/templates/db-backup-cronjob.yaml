apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-db-backup
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}-db-backup
    app.kubernetes.io/component: backup
spec:
  schedule: "0 */6 * * *"  # Every 6 hours
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 1800
      template:
        metadata:
          labels:
            app.kubernetes.io/name: {{ .Release.Name }}-db-backup
        spec:
          restartPolicy: Never
          containers:
            - name: backup
              image: postgres:16-alpine
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  TIMESTAMP=$(date +%Y%m%d_%H%M%S)
                  BACKUP_FILE="/backups/inec_${TIMESTAMP}.sql.gz"
                  echo "Starting backup: ${BACKUP_FILE}"
                  pg_dump "${DATABASE_URL}" | gzip > "${BACKUP_FILE}"
                  echo "Backup completed: $(du -h ${BACKUP_FILE} | cut -f1)"
                  # Retain last 30 backups (5 days at 6-hour intervals)
                  ls -t /backups/inec_*.sql.gz | tail -n +31 | xargs -r rm
                  echo "Cleanup done. Backups retained: $(ls /backups/inec_*.sql.gz | wc -l)"
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Release.Name }}-db-credentials
                      key: url
              volumeMounts:
                - name: backup-storage
                  mountPath: /backups
              resources:
                requests:
                  memory: "256Mi"
                  cpu: "200m"
                limits:
                  memory: "1Gi"
                  cpu: "1000m"
          volumes:
            - name: backup-storage
              persistentVolumeClaim:
                claimName: {{ .Release.Name }}-db-backups
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-db-backups
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}-db-backups
    app.kubernetes.io/component: backup
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.backup.storageSize | default "50Gi" }}
  storageClassName: {{ .Values.backup.storageClass | default "standard" }}
