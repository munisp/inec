# INEC Platform Helm Values
# Environment: production | staging | development

global:
  environment: production
  domain: inec.gov.ng
  imageRegistry: ghcr.io/munisp

# Backend (Go)
backend:
  replicaCount: 3
  image:
    repository: ghcr.io/munisp/inec-backend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
  env:
    PORT: "8080"
    DB_DRIVER: postgres
    DB_HOST: "{{ .Release.Name }}-postgresql"
    DB_PORT: "5432"
    DB_NAME: inec
    REDIS_URL: "{{ .Release.Name }}-redis-master:6379"
    KAFKA_BROKERS: "{{ .Release.Name }}-kafka:9092"
    KEYCLOAK_URL: "http://{{ .Release.Name }}-keycloak:8080"
    KEYCLOAK_REALM: inec
    OPENSEARCH_URL: "http://{{ .Release.Name }}-opensearch:9200"
    TEMPORAL_URL: "{{ .Release.Name }}-temporal:7233"
    TIGERBEETLE_ADDR: "{{ .Release.Name }}-tigerbeetle:3001"
    APISIX_ADMIN_URL: "http://{{ .Release.Name }}-apisix-admin:9180"
    DAPR_HTTP_PORT: "3500"
    PERMIFY_URL: "{{ .Release.Name }}-permify:3476"
    MOJALOOP_URL: "http://{{ .Release.Name }}-mojaloop:4002"
    FLUVIO_URL: "{{ .Release.Name }}-fluvio:9003"
    LAKEHOUSE_URL: "http://{{ .Release.Name }}-lakehouse:8181"
    OPENAPPSEC_URL: "http://{{ .Release.Name }}-openappsec:8082"
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 20
    targetCPUUtilization: 70
    targetMemoryUtilization: 80
  podDisruptionBudget:
    minAvailable: 2

# Frontend (Nginx + React)
frontend:
  replicaCount: 2
  image:
    repository: ghcr.io/munisp/inec-frontend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "500m"

# ML Inference Server (Python)
inference:
  enabled: true
  replicaCount: 2
  image:
    repository: ghcr.io/munisp/inec-inference
    tag: latest
  service:
    port: 8090
  resources:
    requests:
      memory: "512Mi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "2000m"

# Rust Inference Engine
rustInference:
  enabled: true
  replicaCount: 2
  image:
    repository: ghcr.io/munisp/inec-rust-inference
    tag: latest
  service:
    port: 8091
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1000m"

# Ingress
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
  hosts:
    - host: api.inec.gov.ng
      paths:
        - path: /
          pathType: Prefix
          service: backend
    - host: app.inec.gov.ng
      paths:
        - path: /
          pathType: Prefix
          service: frontend
  tls:
    - secretName: inec-tls
      hosts:
        - api.inec.gov.ng
        - app.inec.gov.ng

# Dependencies
postgresql:
  enabled: true
  auth:
    database: inec
    postgresPassword: ""
    existingSecret: inec-db-credentials
  primary:
    persistence:
      size: 100Gi
    resources:
      requests:
        memory: "512Mi"
        cpu: "500m"
  readReplicas:
    replicaCount: 2

redis:
  enabled: true
  architecture: replication
  auth:
    enabled: true
    existingSecret: inec-redis-credentials
  replica:
    replicaCount: 3

kafka:
  enabled: true
  replicaCount: 3
  persistence:
    size: 50Gi

opensearch:
  enabled: true
  replicas: 3
  persistence:
    size: 50Gi

keycloak:
  enabled: true
  auth:
    adminUser: admin
    existingSecret: inec-keycloak-credentials
  postgresql:
    enabled: false
  externalDatabase:
    host: "{{ .Release.Name }}-postgresql"
    database: keycloak

# Monitoring
monitoring:
  enabled: true
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: true
  grafana:
    enabled: true
    dashboards:
      - election-overview
      - biometric-performance
      - middleware-health

# Network Policies
networkPolicy:
  enabled: true
  ingress:
    allowedNamespaces:
      - monitoring
      - ingress-nginx
